  if(!CU)return false;
  if(CU.role==='superadmin')return true;
  if(CU.role==='partner')return false;
  const perms=CU.permissions||{};

}

/* ─────────────────────────── DB LOAD / SEED ─────────────────────────── */
async function sbLoad(){
  const[uR,aR,amR,stR,ddR,pR,auR]=await Promise.all([
    SB.from('pt_users').select('*'),
    SB.from('pt_accounts').select('*').order('created_at',{ascending:true}),
    SB.from('pt_am_updates').select('*'),
    SB.from('pt_stages').select('*').order('sort_order',{ascending:true}),
    SB.from('pt_settings').select('*').eq('key','ddOptions').single(),
    SB.from('pt_pending_signups').select('*'),
    SB.from('pt_audit_log').select('*').order('created_at',{ascending:false}).limit(200),
  ]);
  if(uR.data)DB.users=uR.data;
  if(aR.data)DB.accounts=aR.data.map(mapAcc);
  if(amR.data)DB.amUpdates=amR.data.map(mapAM);
  if(stR.data)DB.stages=stR.data.map(r=>({id:r.id,name:r.name}));
  if(ddR.data&&ddR.data.value)DB.dd=ddR.data.value;
  if(pR.data)DB.pendingSignups=pR.data;
  if(auR.data)DB.auditLog=auR.data.map(r=>({ts:new Date(r.created_at).toLocaleString('en-IN'),user:r.user_name,role:r.user_role,action:r.action,record:r.record_name,field:r.field_name,oldv:r.old_value||'',newv:r.new_value||''}));
}
async function sbSeed(){
  await SB.from('pt_users').upsert(SEED_USERS);
  await SB.from('pt_stages').upsert(SEED_STAGES);
  await SB.from('pt_settings').upsert([{key:'ddOptions',value:SEED_DD}]);
  await SB.from('pt_accounts').upsert(SEED_ACCOUNTS);
  await SB.from('pt_am_updates').upsert(SEED_AM);
}
async function bootDB(){
  const{data:ex}=await SB.from('pt_users').select('id').limit(1);
  if(!ex||ex.length===0)await sbSeed();
  await sbLoad();
  const sid=localStorage.getItem('pt_session');
  if(sid){const u=DB.users.find(x=>x.id===sid&&x.status==='active');if(u){CU={...u};}}
  BOOT=false;R();
  document.getElementById('sync-badge').style.display='block';
  SB.channel('pt-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_accounts'},async()=>{const{data}=await SB.from('pt_accounts').select('*').order('created_at',{ascending:true});if(data){DB.accounts=data.map(mapAcc);R();}})
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_am_updates'},async()=>{const{data}=await SB.from('pt_am_updates').select('*');if(data){DB.amUpdates=data.map(mapAM);R();}})
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_users'},async()=>{const{data}=await SB.from('pt_users').select('*');if(data){DB.users=data;if(CU){const s=DB.users.find(u=>u.id===CU.id&&u.status==='active');if(!s){CU=null;localStorage.removeItem('pt_session');}else CU={...s};}R();}})
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_stages'},async()=>{const{data}=await SB.from('pt_stages').select('*').order('sort_order',{ascending:true});if(data){DB.stages=data.map(r=>({id:r.id,name:r.name}));R();}})
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_settings'},async()=>{const{data}=await SB.from('pt_settings').select('*').eq('key','ddOptions').single();if(data&&data.value){DB.dd=data.value;R();}})
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_pending_signups'},async()=>{const{data}=await SB.from('pt_pending_signups').select('*');if(data){DB.pendingSignups=data;R();}})
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_audit_log'},async()=>{const{data}=await SB.from('pt_audit_log').select('*').order('created_at',{ascending:false}).limit(200);if(data){DB.auditLog=data.map(r=>({ts:new Date(r.created_at).toLocaleString('en-IN'),user:r.user_name,role:r.user_role,action:r.action,record:r.record_name,field:r.field_name,oldv:r.old_value||'',newv:r.new_value||''}));R();}})
    .subscribe();
}
async function sbLog(action,record,field,oldv,newv,extra={}){
  try{
    await SB.from('pt_audit_log').insert([{user_name:CU.name,user_role:CU.role,action,record_name:record,field_name:field,old_value:oldv||'',new_value:newv||'',user_id:CU.id,account_id:extra.accountId||null,extra_data:Object.keys(extra).length?JSON.stringify(extra):null}]);
  }catch(e){console.warn('audit log failed:',e);}
}

async function doLogin(){
  const e=(document.getElementById('le')?.value||'').trim(),p=document.getElementById('lp')?.value||'';
  const u=DB.users.find(x=>x.email===e&&x.password===p&&x.status==='active');
  if(u){CU=u;AL=null;PAGE='dashboard';localStorage.setItem('pt_session',u.id);R();}
  else{const pd=DB.pendingSignups.find(x=>x.email===e);pd?sal('Account pending admin approval.','ai',5000):sal('Invalid email or password','ae');}
}
async function doSignup(){
  const n=(document.getElementById('sn')?.value||'').trim(),e=(document.getElementById('se')?.value||'').trim(),p=document.getElementById('sp')?.value||'',nt=(document.getElementById('snt')?.value||'').trim();
  if(!n||!e||!p)return sal('Required fields missing','ae');
  if(p.length<8)return sal('Password must be at least 8 characters','ae');
  if(DB.users.find(u=>u.email===e)||DB.pendingSignups.find(x=>x.email===e))return sal('Email already registered','ae');
  const{error}=await SB.from('pt_pending_signups').insert([{id:uid(),name:n,email:e,password:p,note:nt,requested_at:today()}]);
  if(error)return sal('Error: '+error.message,'ae');
  ATAB='login';sal('Request submitted! Admin will review shortly.','as',5000);
}
async function rs1(){const e=(document.getElementById('re')?.value||'').trim();if(!e)return sal('Enter email','ae');if(!DB.users.find(u=>u.email===e))return sal('No account found','ae');REMAIL=e;const tok=Math.floor(100000+Math.random()*900000).toString();DB._rtok=tok;await SB.from('pt_settings').upsert([{key:'reset_'+e,value:{token:tok}}]);RS=2;AL=null;R();}
async function rs2(){const entered=(document.getElementById('rt')?.value||'').trim();if(!DB._rtok||DB._rtok!==entered)return sal('Invalid code','ae');RS=3;AL=null;R();}
async function rs3(){const np=document.getElementById('rnp')?.value||'',cp=document.getElementById('rcp')?.value||'';if(np.length<8)return sal('Min 8 chars','ae');if(np!==cp)return sal('Passwords do not match','ae');await SB.from('pt_users').update({password:np}).eq('email',REMAIL);await SB.from('pt_settings').delete().eq('key','reset_'+REMAIL);ATAB='login';RS=1;REMAIL='';delete DB._rtok;sal('Password reset! Sign in.','as',4000);}
async function doLogout(){CU=null;AL=null;ATAB='login';localStorage.removeItem('pt_session');R();}

function enAccs(){return DB.accounts.map(a=>{const am=getAM(a.id);return{...a,am,partnerName:gu(a.assignedPartnerId).name,stageName:gs(a.stageId).name,amOD:am?odD(am.nextConnectDateDM):0,trOD:odD(a.trials.connectDate)};});}
function filtAccs(){
  let r=isA()?enAccs():enAccs().filter(a=>a.assignedPartnerId===CU.id);
  if(FILTERS.status)r=r.filter(a=>a.overallStatus===FILTERS.status);
  if(FILTERS.partner)r=r.filter(a=>a.assignedPartnerId===FILTERS.partner);
  if(FILTERS.stage)r=r.filter(a=>a.stageId===FILTERS.stage);
  if(SEARCH)r=r.filter(a=>a.companyName.toLowerCase().includes(SEARCH.toLowerCase())||a.partnerName.toLowerCase().includes(SEARCH.toLowerCase()));
  if(Object.values(SF).some(Boolean))r=r.filter(a=>{const od=a.amOD>0;const ds=!od&&a.am?.nextConnectDateDM&&(new Date(a.am.nextConnectDateDM)-new Date(today()))/86400000<=3;return(SF.red&&od)||(SF.yellow&&ds)||(SF.green&&a.overallStatus==='green');});
  if(ASGN&&ASGN!=='all')r=r.filter(a=>a.assignedPartnerId===ASGN);
  return r;
}

/* ══════════════════════════════════════════════════════════════════
   STAGE ACTION ITEMS — shared builder used in AM Update + Admin view
   ══════════════════════════════════════════════════════════════════
   Progressive trail:
   • Initial connect  → shows Initial field (editable)
   • Trials connect   → shows Initial (locked/toggle) + Trials (editable)
   • Business connect → shows Initial (locked/toggle) + Trials (locked/toggle) + Biz 1/2/3 (editable)
   • No stage yet     → shows Initial field only (will save when stage chosen)
*/
function buildStageActionItems(exAM){
  const cs = exAM ? exAM.connectStage : '';
  const showInitial = !cs || cs==='Initial connect' || cs==='Trials connect' || cs==='Business connect';
  const showTrials  = cs==='Trials connect' || cs==='Business connect';
  const showBiz     = cs==='Business connect';

  let html = '';

  /* ── INITIAL CONNECT ── */
  if(showInitial){
    const isCurrentStage = cs==='' || cs==='Initial connect';
    const isLocked       = !isCurrentStage && !EDIT_UNLOCKED.initial;
    const val            = exAM ? (exAM.initialActionItem||'') : '';

    html += `<div class="stage-ai-block initial">
      <div class="stage-ai-header">
        <span class="stage-badge badge-initial">&#x1F7E1; Initial Connect Action Item</span>
        ${!isCurrentStage
          ? `<button type="button"
               class="btn-edit-toggle${EDIT_UNLOCKED.initial?' active':''}"
               onclick="EDIT_UNLOCKED.initial=!EDIT_UNLOCKED.initial;R()">
               ${EDIT_UNLOCKED.initial?'&#x1F513; Editing':'&#x1F512; Edit'}
             </button>`
          : ''}
      </div>`;
    if(isLocked){
      html += `<div class="ro-locked">${val||'<em>No action item recorded</em>'}</div>`;
    } else {
      html += `<input type="text" id="f-init-ai" value="${val.replace(/"/g,'&quot;')}" placeholder="Action taken at Initial Connect stage…">`;
    }
    html += `</div>`;
  }

  /* ── TRIALS CONNECT ── */
  if(showTrials){
    const isCurrentStage = cs==='Trials connect';
    const isLocked       = !isCurrentStage && !EDIT_UNLOCKED.trials;
    const val            = exAM ? (exAM.trialsActionItem||'') : '';

    html += `<div class="stage-ai-block trials">
      <div class="stage-ai-header">
        <span class="stage-badge badge-trials">&#x1F7E2; Trials Connect Action Item</span>
        ${!isCurrentStage
          ? `<button type="button"
               class="btn-edit-toggle${EDIT_UNLOCKED.trials?' active':''}"
               onclick="EDIT_UNLOCKED.trials=!EDIT_UNLOCKED.trials;R()">
               ${EDIT_UNLOCKED.trials?'&#x1F513; Editing':'&#x1F512; Edit'}
             </button>`
          : ''}
      </div>`;
    if(isLocked){
      html += `<div class="ro-locked">${val||'<em>No action item recorded</em>'}</div>`;
    } else {
      html += `<input type="text" id="f-trials-ai" value="${val.replace(/"/g,'&quot;')}" placeholder="Action taken at Trials Connect stage…">`;
    }
    html += `</div>`;
  }

  /* ── BUSINESS CONNECT (3 sub-items) ── */
  if(showBiz){
    const b1=exAM?(exAM.bizAction1||''):'';
    const b2=exAM?(exAM.bizAction2||''):'';
    const b3=exAM?(exAM.bizAction3||''):'';

    html += `<div class="stage-ai-block biz">
      <div class="stage-ai-header">
        <span class="stage-badge badge-biz">&#x1F535; Business Connect Action Items</span>
        <span style="font-size:10px;color:#1565c0;background:#e3f2fd;padding:2px 7px;border-radius:8px">3 sub-items</span>
      </div>
      <div class="fg" style="margin-bottom:7px">
        <label class="fl" style="color:#1565c0">Business Action 1</label>
        <input type="text" id="f-biz1" value="${b1.replace(/"/g,'&quot;')}" placeholder="First business connect action…">
      </div>
      <div class="fg" style="margin-bottom:7px">

  return `<div class="card" style="margin-top:10px">

  <div style="display:flex;gap:7px;flex-wrap:wrap">

function drawCH(){
  Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};
  const all=enAccs();
  const dc=document.getElementById('donutC');
  if(dc)charts.d=new Chart(dc,{type:'doughnut',data:{labels:['Red','Yellow','Green'],datasets:[{data:[all.filter(a=>a.overallStatus==='red').length,all.filter(a=>a.overallStatus==='yellow').length,all.filter(a=>a.overallStatus==='green').length],backgroundColor:['#e74c3c','#e6a817','#3aaa5e'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{display:false}}}});
  const bc=document.getElementById('barC');
  const byP=DB.users.filter(u=>u.role==='partner').map(p=>({name:p.name.split(' ')[0],od:all.filter(a=>a.assignedPartnerId===p.id&&a.amOD>0).length})).filter(x=>x.od>0);
  if(bc&&byP.length)charts.b=new Chart(bc,{type:'bar',data:{labels:byP.map(d=>d.name),datasets:[{data:byP.map(d=>d.od),backgroundColor:'#e74c3c',borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}});
  const sbEl=document.getElementById('stageBar');
  if(sbEl){
    const chartAccs=isA()?all:all.filter(a=>a.assignedPartnerId===CU.id);
    const stageCounts=DB.stages.map(s=>({name:s.name,count:chartAccs.filter(a=>a.stageId===s.id).length})).filter(s=>s.count>0);
    charts.sb=new Chart(sbEl,{type:'bar',data:{labels:stageCounts.map(s=>s.name.length>14?s.name.slice(0,14)+'…':s.name),datasets:[{data:stageCounts.map(s=>s.count),backgroundColor:['#4a7ec7','#3a8fd6','#3aaa5e','#e6a817','#e74c3c','#9b59b6'],borderRadius:6,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1,font:{size:10}}},x:{ticks:{font:{size:9}}}}}});
  }
  const cdEl=document.getElementById('connectDonut');
  if(cdEl){
    const donutAccs=isA()?all:all.filter(a=>a.assignedPartnerId===CU.id);
    const cCounts=[donutAccs.filter(a=>a.am&&a.am.connectStage==='Initial connect').length,donutAccs.filter(a=>a.am&&a.am.connectStage==='Trials connect').length,donutAccs.filter(a=>a.am&&a.am.connectStage==='Business connect').length,donutAccs.filter(a=>!a.am||!a.am.connectStage).length];
    charts.cd=new Chart(cdEl,{type:'doughnut',data:{labels:['Initial','Trials','Business','Not started'],datasets:[{data:cCounts,backgroundColor:['#e6a817','#4a7ec7','#3aaa5e','#dde3ec'],borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{legend:{display:false}}}});
  }
  const amEl=document.getElementById('amLeader');
  if(amEl){
    const stagePct={'Initial connect':33,'Trials connect':66,'Business connect':100};
    const pts=isA()?DB.users.filter(u=>u.role==='partner'):DB.users.filter(u=>u.id===CU.id);
    const amData=pts.map(p=>{const pa=all.filter(a=>a.assignedPartnerId===p.id);const avg=pa.length?Math.round(pa.reduce((s,a)=>s+(stagePct[a.am&&a.am.connectStage]||0),0)/pa.length):0;return{name:p.name.split(' ')[0],avg,total:pa.length};}).filter(d=>d.total>0);
    if(amData.length)charts.am=new Chart(amEl,{type:'bar',data:{labels:amData.map(d=>d.name),datasets:[{data:amData.map(d=>d.avg),backgroundColor:amData.map(d=>d.avg>=66?'#3aaa5e':d.avg>=33?'#4a7ec7':'#e6a817'),borderRadius:6,borderSkipped:false}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,max:100,ticks:{callback:v=>v+'%',font:{size:10}}},y:{ticks:{font:{size:10}}}}}});
  }
}

function getRV(a){
  const am=a.am;
  return{
    companyName:a.companyName,accountGroup:a.accountGroup,focusArea:a.focusArea,
    programManager:a.programManager,companyType:a.companyType,accountPriority:a.accountPriority,
    opportunityCategory:a.opportunityCategory,crop:a.crop,stageName:gs(a.stageId).name,
    overallStatus:a.overallStatus,adminActionItem:a.adminActionItem||'',
    partnerName:gu(a.assignedPartnerId).name,

    nextConnectDateDM:am?.nextConnectDateDM||'',amOD:a.amOD||0,
    initialActionItem:am?.initialActionItem||'',
    trialsActionItem:am?.trialsActionItem||'',
    bizAction1:am?.bizAction1||'',bizAction2:am?.bizAction2||'',bizAction3:am?.bizAction3||'',

    trialOD:a.trOD||0,agriManager:a.trials.agriManager,remarks:a.trials.remarks
  };
}

/* ─────────────────────────── EXCEL GENERATION ─────────────────────────── */
function getReportDateRange(){
  const from=document.getElementById('report-from-date')?.value||'';
  const to=document.getElementById('report-to-date')?.value||'';
  return{from,to};
}
function inDateRange(tsStr,from,to){
  if(!from&&!to)return true;
  try{
    const parts=tsStr.split(',')[0].trim().split('/');
    if(parts.length!==3)return true;
    const d=new Date(parts[2]+'-'+parts[1].padStart(2,'0')+'-'+parts[0].padStart(2,'0'));
    const dStr=d.toISOString().split('T')[0];
    if(from&&dStr<from)return false;
    if(to&&dStr>to)return false;
    return true;
  }catch(e){return true;}
}

async function buildBrandedWorkbook(title,columnHeaders,dataRows,colWidths,sheetName){
  const wb=new ExcelJS.Workbook();
  wb.creator='AgriTrack';wb.created=new Date();
  const ws=wb.addWorksheet(sheetName||'Report',{properties:{tabColor:{argb:'FF4A7EC7'}},views:[{state:'normal',zoomScale:100}]});
  ws.getRow(1).height=18;ws.getRow(2).height=18;ws.getRow(3).height=18;ws.getRow(4).height=6;
  const totalCols=Math.max(columnHeaders.length,8);
  const lastColLetter=String.fromCharCode(65+Math.min(totalCols-1,25));
  ws.mergeCells('A1:'+lastColLetter+'1');
  const companyCell=ws.getCell('A1');
  companyCell.value='String Bio Pvt Ltd — AgriTrack';
  companyCell.font={name:'Arial',bold:true,size:18,color:{argb:'FF4A7EC7'}};
  companyCell.alignment={horizontal:'center',vertical:'middle'};
  ws.mergeCells('A2:'+lastColLetter+'2');
  const subCell=ws.getCell('A2');
  subCell.value=title;
  subCell.font={name:'Arial',bold:true,size:12,color:{argb:'FF2D3748'}};
  subCell.alignment={horizontal:'center',vertical:'middle'};
  ws.mergeCells('A3:'+lastColLetter+'3');
  const metaCell=ws.getCell('A3');
  metaCell.value='Downloaded by: '+CU.name+' ('+displayRole(CU.role)+')  |  Date: '+new Date().toLocaleString('en-IN')+'  |  Records: '+dataRows.length;
  metaCell.font={name:'Arial',size:10,color:{argb:'FF7A8499'}};
  metaCell.alignment={horizontal:'center',vertical:'middle'};
  ws.getRow(4).height=6;
  const hdrRow=ws.getRow(5);
  columnHeaders.forEach((h,idx)=>{
    const cell=hdrRow.getCell(idx+1);
    cell.value=h;
    cell.font={name:'Arial',bold:true,size:11,color:{argb:'FFFFFFFF'}};
    cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF4A7EC7'}};
    cell.alignment={horizontal:'center',vertical:'middle',wrapText:true};
    cell.border={top:{style:'thin',color:{argb:'FF2D3748'}},bottom:{style:'thin',color:{argb:'FF2D3748'}},left:{style:'thin',color:{argb:'FF2D3748'}},right:{style:'thin',color:{argb:'FF2D3748'}}};
  });
  hdrRow.height=28;
  dataRows.forEach((row,idx)=>{
    const r=6+idx;
    const bgColor=idx%2===0?'FFF4F6FB':'FFFFFFFF';
    row.forEach((val,colIdx)=>{
      const cell=ws.getRow(r).getCell(colIdx+1);
      cell.value=val;
      cell.font={name:'Arial',size:10,color:{argb:'FF2D3748'}};
      cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:bgColor}};
      cell.alignment={vertical:'middle',wrapText:true};
      cell.border={top:{style:'thin',color:{argb:'FFDDE3EC'}},bottom:{style:'thin',color:{argb:'FFDDE3EC'}},left:{style:'thin',color:{argb:'FFDDE3EC'}},right:{style:'thin',color:{argb:'FFDDE3EC'}}};
    });
  });
  (colWidths||columnHeaders.map(()=>18)).forEach((w,idx)=>{ws.getColumn(idx+1).width=w;});
  return wb;
}
async function downloadWorkbook(wb,filename){
  const buf=await wb.xlsx.writeBuffer();
  const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  saveAs(blob,filename);
}

async function dlAccountsXLSX(){
  try{
    const dr=getReportDateRange();
    const sel=COLS.filter(c=>RPTP[c.k]);
    if(!sel.length)return sal('Please select at least one column','ae');
    let allAccs=enAccs();
    if(dr.from||dr.to){allAccs=allAccs.filter(a=>{const d=a.createdAt||a.updatedAt;if(dr.from&&d<dr.from)return false;if(dr.to&&d>dr.to)return false;return true;});}
    const colHdrs=sel.map(c=>c.l);
    const rows=allAccs.map(a=>{const v=getRV(a);return sel.map(c=>v[c.k]??'');});
    const widths=sel.map(c=>c.k.includes('Action')||c.k==='remarks'?28:18);
    const wb=await buildBrandedWorkbook('Accounts Report',colHdrs,rows,widths,'Accounts Report');
    await downloadWorkbook(wb,'StringBio_AgriTrack_Accounts_'+today()+'.xlsx');
    sal('Accounts report downloaded!','as');
  }catch(e){console.error(e);sal('Download failed: '+e.message,'ae');}
}

}

async function buildAuditXLSX(logs,title,filenamePrefix){
  const colHdrs=['Timestamp','User','Role','Action','Company','Field','Old Value','New Value'];
  const rows=logs.map(l=>[l.ts,l.user,displayRole(l.role),l.action,l.record,l.field,l.oldv||'',l.newv||'']);
  const widths=[22,20,18,26,24,22,22,22];
  const wb=await buildBrandedWorkbook(title,colHdrs,rows,widths,'Audit Log');
  await downloadWorkbook(wb,filenamePrefix+'_'+today()+'.xlsx');
  sal('Downloaded '+logs.length+' audit records!','as');
}

/* ─────────────────────────── PROGRESS PAGES ─────────────────────────── */
function pgProgress(){
  const myAccs=enAccs().filter(a=>a.assignedPartnerId===CU.id);
  const stages=['Initial connect','Trials connect','Business connect'];
  const stageColors={'Initial connect':'#e6a817','Trials connect':'#4a7ec7','Business connect':'#3aaa5e'};
  const stagePct={'Initial connect':33,'Trials connect':66,'Business connect':100};
  if(!myAccs.length)return'<div class="card"><div style="text-align:center;padding:28px;color:var(--muted)">No accounts assigned yet.</div></div>';
  const done=myAccs.filter(a=>a.am&&a.am.connectStage==='Business connect').length;
  const inProgress=myAccs.filter(a=>a.am&&a.am.connectStage&&a.am.connectStage!=='Business connect').length;
  const notStarted=myAccs.filter(a=>!a.am||!a.am.connectStage).length;
  const avgPct=myAccs.length?Math.round(myAccs.reduce((sum,a)=>sum+(stagePct[a.am?.connectStage]||0),0)/myAccs.length):0;

  let accsHtml='';
  myAccs.forEach(a=>{
    const cs=a.am?a.am.connectStage:'';
    const pct=stagePct[cs]||0;
    const col=stageColors[cs]||'#dde3ec';
    const aiMap={
      'Initial connect':a.am?.initialActionItem||'',
      'Trials connect':a.am?.trialsActionItem||'',
      'Business connect':[a.am?.bizAction1,a.am?.bizAction2,a.am?.bizAction3].filter(Boolean).join(' | ')||''
    };
    let milestones='';
    stages.forEach((s,i)=>{
      const isDone=pct>=(i+1)*33, isActive=cs===s;
      const aiStr=aiMap[s]?`<div style="font-size:9px;color:#4a5568;font-style:italic;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${aiMap[s]}">${aiMap[s]}</div>`:'';

        <div style="font-size:9px;color:${isActive?stageColors[s]:'var(--muted)'};font-weight:${isActive?'700':'400'}">${s}</div>
        ${aiStr}
      </div>`;
    });
    const adminAIHtml=a.adminActionItem?`<div style="margin-top:6px;padding:5px 9px;background:#fff8f0;border:1px solid #ffcc80;border-radius:5px;font-size:11px"><span style="color:#e65100;font-weight:700">&#128221; Admin Task:</span> ${a.adminActionItem}</div>`:'';
    accsHtml+=`<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #f0f3f8">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div><div style="font-size:13px;font-weight:700">${a.companyName}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${a.accountGroup} &middot; ${a.stageName}</div></div>
        <div style="display:flex;gap:6px;align-items:center">${cs?`<span style="background:${col}22;color:${col};border:1px solid ${col}44;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700">${cs}</span>`:'<span style="background:#f4f6fb;color:var(--muted);padding:2px 10px;border-radius:12px;font-size:11px">Not started</span>'}${a.amOD>0?`<span class="oday">+${a.amOD}d OD</span>`:''}<span style="font-size:14px;font-weight:800;color:${col||'var(--muted)'}">${pct}%</span></div>
      </div>
      <div style="background:#f0f3f8;border-radius:8px;height:8px;overflow:hidden;margin-bottom:6px"><div style="background:linear-gradient(90deg,#c0392b,#e74c3c 20%,#e6a817 33%,#f0c040 50%,#2ecc71 66%,#3aaa5e 100%);height:100%;width:${pct}%;border-radius:8px;transition:width .8s"></div></div>
      <div style="display:flex;gap:0">${milestones}</div>
      ${adminAIHtml}
    </div>`;
  });

  return `<div style="font-size:17px;font-weight:700;margin-bottom:3px">My Progress Report</div>
<div style="font-size:12px;color:var(--muted);margin-bottom:16px">Track your AM Connect progress and action items across all assigned accounts.</div>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">

<div class="kcard kc-g"><div class="klbl">Business Connect</div><div class="knum">${done}</div><div class="ksub">Completed</div></div>

<div class="card" style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div class="ctitle" style="margin-bottom:0">Overall Portfolio Progress</div><div style="font-size:20px;font-weight:800;color:#4a7ec7">${avgPct}%</div></div>
<div style="background:#f0f3f8;border-radius:10px;height:14px;overflow:hidden"><div style="background:linear-gradient(90deg,#c0392b,#e74c3c ${Math.min(avgPct,20)}%,#e6a817 33%,#f0c040 50%,#2ecc71 66%,#3aaa5e 100%);height:100%;width:${avgPct}%;border-radius:10px;transition:width 1s"></div></div></div>
<div class="card"><div class="ctitle">Account-wise Progress &amp; Action Items</div>${accsHtml}</div>`;
}

  const stageColors={'Initial connect':'#e6a817','Trials connect':'#4a7ec7','Business connect':'#3aaa5e'};

  const amRows=pts.map(p=>{const pa=all.filter(a=>a.assignedPartnerId===p.id);if(!pa.length)return null;const done=pa.filter(a=>a.am&&a.am.connectStage==='Business connect').length;const inProg=pa.filter(a=>a.am&&a.am.connectStage&&a.am.connectStage!=='Business connect').length;const notStarted=pa.filter(a=>!a.am||!a.am.connectStage).length;const avg=pa.length?Math.round(pa.reduce((s,a)=>s+(stagePct[a.am&&a.am.connectStage]||0),0)/pa.length):0;return{p,pa,done,inProg,notStarted,avg};}).filter(Boolean);

  function buildAMCard(row){
    const{p,pa,done,inProg,notStarted,avg}=row;
    let accs='';
    pa.forEach(a=>{
      const cs=a.am?a.am.connectStage:'';const pct=stagePct[cs]||0;const col=stageColors[cs]||'#dde3ec';
      const latestAI=[a.am?.bizAction3,a.am?.bizAction2,a.am?.bizAction1,a.am?.trialsActionItem,a.am?.initialActionItem].find(Boolean)||'';
      accs+=`<div style="padding:7px 9px;border:1px solid ${a.amOD>0?'#f5b7b1':'var(--border)'};border-radius:7px;background:${a.amOD>0?'#fff8f8':'#fafbfe'}">
        <div style="font-size:11px;font-weight:700;margin-bottom:4px">${a.companyName}</div>
        <div style="background:#f0f3f8;border-radius:5px;height:5px;overflow:hidden;margin-bottom:4px"><div style="background:${col};height:100%;width:${pct}%;border-radius:5px"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:10px"><span style="color:${col};font-weight:600">${cs||'Not started'}</span>${a.amOD>0?`<span class="oday">+${a.amOD}d</span>`:`<span style="color:#3aaa5e;font-weight:600">${pct}%</span>`}</div>
        ${latestAI?`<div style="font-size:9px;color:#4a5568;margin-top:3px;font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${latestAI}">${latestAI}</div>`:''}
      </div>`;
    });
    const initials=p.name.split(' ').map(w=>w[0]).join('').slice(0,2);
    return `<div style="margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid #f0f3f8">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:8px"><div class="av avp" style="width:32px;height:32px;font-size:11px">${initials}</div>
        <div><div style="font-size:13px;font-weight:700">${p.name}</div><div style="font-size:11px;color:var(--muted)">${pa.length} accounts &middot; ${done} completed &middot; ${inProg} in progress</div></div></div>
        <div style="font-size:22px;font-weight:800;color:#4a7ec7">${avg}%</div>
      </div>
      <div style="background:#f0f3f8;border-radius:8px;height:10px;overflow:hidden;margin-bottom:8px"><div style="background:linear-gradient(90deg,#c0392b,#e74c3c 20%,#e6a817 33%,#f0c040 50%,#2ecc71 66%,#3aaa5e 100%);height:100%;width:${avg}%;border-radius:8px"></div></div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:7px">${accs}</div>
    </div>`;
  }

  const companyRows=all.map(a=>{
    const latestAI=[a.am?.bizAction3,a.am?.bizAction2,a.am?.bizAction1,a.am?.trialsActionItem,a.am?.initialActionItem].find(Boolean)||'';
    const col=stageColors[a.am?.connectStage]||'var(--muted)';
    const bg=stageColors[a.am?.connectStage]?stageColors[a.am.connectStage]+'22':'#f4f6fb';
    const border=stageColors[a.am?.connectStage]?stageColors[a.am.connectStage]+'44':'#dde3ec';
    const pct=stagePct[a.am?.connectStage]||0;
    return `<tr>
      <td><strong style="font-size:12px">${a.companyName}</strong>${a.adminActionItem?`<div style="font-size:10px;color:#e65100;margin-top:2px">&#128221; ${a.adminActionItem.substring(0,35)}${a.adminActionItem.length>35?'...':''}</div>`:''}</td>
      <td style="font-size:11px;color:var(--muted)">${a.accountGroup||'—'}</td>
      <td style="font-size:11px">${a.partnerName}</td>
      <td><span style="background:${bg};color:${col};border:1px solid ${border};padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600">${a.am?.connectStage||'Not started'}</span></td>
      <td><div style="display:flex;align-items:center;gap:7px"><div style="background:#f0f3f8;border-radius:5px;height:6px;width:80px;overflow:hidden"><div style="background:${stageColors[a.am?.connectStage]||'#dde3ec'};height:100%;width:${pct}%;border-radius:5px"></div></div><span style="font-size:11px;font-weight:700;color:${col}">${pct}%</span></div></td>
      <td><span class="pill ${sc(a.overallStatus)}" style="font-size:10px">${a.overallStatus}</span></td>
      <td>${a.amOD>0?`<span class="oday">+${a.amOD}d</span>`:'<span style="color:#3aaa5e;font-size:11px">OK</span>'}</td>
      <td style="font-size:10px;color:#4a5568;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${latestAI||''}">${latestAI||'—'}</td>
    </tr>`;
  });

  const totalAcc=all.length,bizDone=all.filter(a=>a.am&&a.am.connectStage==='Business connect').length,inProg=all.filter(a=>a.am&&a.am.connectStage&&a.am.connectStage!=='Business connect').length,notStarted=all.filter(a=>!a.am||!a.am.connectStage).length;
  return `<div style="font-size:17px;font-weight:700;margin-bottom:3px">Progress Report</div>
<div style="font-size:12px;color:var(--muted);margin-bottom:14px">Company-wise and Alliance Manager-based progress overview.</div>
<button class="abtn" style="background:#3aaa5e;color:#fff;padding:7px 16px;margin-bottom:16px" onclick="dlProgressCSV()">&#8595; Download Progress Report (Excel)</button>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">
<div class="kcard kc-b"><div class="klbl">Total Accounts</div><div class="knum">${totalAcc}</div></div>
<div class="kcard kc-g"><div class="klbl">Business Connect</div><div class="knum">${bizDone}</div></div>
<div class="kcard kc-y"><div class="klbl">In Progress</div><div class="knum">${inProg}</div></div>
<div class="kcard kc-r"><div class="klbl">Not Started</div><div class="knum">${notStarted}</div></div></div>
<div class="card" style="margin-bottom:16px"><div class="ctitle">Alliance Manager — Progress Summary</div>${amRows.map(buildAMCard).join('')}</div>
<div class="card"><div class="ctitle">Company-wise Progress Table (with latest action item)</div>
<div class="tscroll"><table style="min-width:700px"><thead><tr><th>Company</th><th>Group</th><th>Alliance Manager</th><th>Connect Stage</th><th>Progress</th><th>Status</th><th>AM OD</th><th>Latest Action Item</th></tr></thead>
<tbody>${companyRows.join('')}</tbody></table></div></div>`;
}

  else if(type==='admin-perms'){
    const a=id?DB.users.find(x=>x.id===id):null;

    const perms=a.permissions||{...DEFAULT_PERMS};

    <div class="infob">Control exactly what this admin can see and do.</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">

    </div>
    <div style="display:flex;gap:7px;margin-bottom:4px"><button class="abtn-sm" style="background:#7b1fa2;color:#fff;padding:4px 10px" onclick="Object.keys(PERM_LABELS).forEach(k=>{const el=document.getElementById('perm-'+k);if(el)el.checked=true})">Grant All</button><button class="abtn-sm btn-ghost" style="padding:4px 10px" onclick="Object.keys(PERM_LABELS).forEach(k=>{const el=document.getElementById('perm-'+k);if(el)el.checked=false})">Revoke All</button></div>
    <div class="ma"><button class="abtn-sm btn-ghost" onclick="closeM()">Cancel</button><button class="abtn" style="background:#7b1fa2;color:#fff;padding:6px 16px" onclick="savePerms('${id}')">Save Permissions</button></div>`;}
  }
  else if(type==='add-stage'||type==='edit-stage'){const s=id?DB.stages.find(x=>x.id===id):null;c=`<div class="mt">${id?'Edit Stage':'Add Stage'}</div>${mfi('Stage Name *','mn',s?.name||'')}<div class="ma"><button class="abtn-sm btn-ghost" onclick="closeM()">Cancel</button><button class="abtn abtn-blue" style="padding:6px 16px" onclick="saveStg('${id||''}')">Save</button></div>`;}
  else if(type==='reset-pw'){const u=DB.users.find(x=>x.id===id);c=`<div class="mt">Reset Password — ${u?.name||''}</div><div class="infob">Set a temporary password.</div>${mfi('New Password *','mnp','','password')}${mfi('Confirm *','mcp','','password')}<div class="ma"><button class="abtn-sm btn-ghost" onclick="closeM()">Cancel</button><button class="abtn-sm btn-yel" style="padding:4px 12px" onclick="adminRP('${id}')">Reset</button></div>`;}
  else if(type==='partner-perms'){
    const p=id?DB.users.find(x=>x.id===id):null;
    if(!p){c='<div class="mt">User not found</div>';}else{
    const pperms=p.partner_permissions||{...DEFAULT_PARTNER_PERMS};
    const groups=['Navigation','Account Overview','AM Connect','Trials'];
    const groupColors={'Navigation':'#4a7ec7','Account Overview':'#1a5276','AM Connect':'#0a3d6b','Trials':'#145a32'};
    const groupBg={'Navigation':'#e8f0fb','Account Overview':'#e8f0fb','AM Connect':'#bdd7f5','Trials':'#d4f5e2'};
    c=`<div class="mt" style="color:#1e8449">&#x1F511; Partner Access — ${p.name}</div>
    <div class="infob">Control exactly what this partner can see and do.</div>
    <div style="display:flex;gap:7px;margin-bottom:12px"><button class="abtn-sm" style="background:#1e8449;color:#fff;padding:4px 10px" onclick="Object.keys(PARTNER_PERM_LABELS).forEach(k=>{const el=document.getElementById('pperm-'+k);if(el)el.checked=true})">Grant All</button><button class="abtn-sm btn-ghost" style="padding:4px 10px" onclick="Object.keys(PARTNER_PERM_LABELS).forEach(k=>{const el=document.getElementById('pperm-'+k);if(el)el.checked=false})">Revoke All</button></div>
    ${groups.map(grp=>{const grpPerms=Object.entries(PARTNER_PERM_LABELS).filter(([k,v])=>v.group===grp);return`<div style="margin-bottom:14px"><div style="background:${groupBg[grp]};color:${groupColors[grp]};padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700;text-transform:uppercase;margin-bottom:8px">${grp}</div>${grpPerms.map(([key,info])=>`<label style="display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border:1px solid ${pperms[key]!==false?'#a9dfbf':'var(--border)'};border-radius:8px;cursor:pointer;background:${pperms[key]!==false?'#eafaf1':'#fff'};margin-bottom:6px"><div><div style="font-size:12px;font-weight:600">${info.label}</div><div style="font-size:10px;color:var(--muted)">${info.desc}</div></div><input type="checkbox" id="pperm-${key}" ${pperms[key]!==false?'checked':''} style="width:18px;height:18px;accent-color:#1e8449;cursor:pointer;flex-shrink:0;margin-left:10px"></label>`).join('')}</div>`;}).join('')}
    <div class="ma"><button class="abtn-sm btn-ghost" onclick="closeM()">Cancel</button><button class="abtn" style="background:#1e8449;color:#fff;padding:6px 16px" onclick="savePartnerPerms('${id}')">Save Access</button></div>`;}
  }
  return`<div class="mo" onclick="if(event.target===this)closeM()"><div class="mc">${c}</div></div>`;
}

/* ─────────────────────────── SAVE: AM UPDATE ─────────────────────────── */
async function _doSaveAM(accId, exId, csFieldId, acdFieldId, ncdFieldId){
  const cs=document.getElementById(csFieldId)?.value||'';
  const acd=document.getElementById(acdFieldId)?.value||'';
  const ncd=document.getElementById(ncdFieldId)?.value||'';

  // Read stage action items — ids are shared between both AM update and admin section
  const initAI=document.getElementById('f-init-ai')?.value||'';
  const trialsAI=document.getElementById('f-trials-ai')?.value||'';
  const biz1=document.getElementById('f-biz1')?.value||'';
  const biz2=document.getElementById('f-biz2')?.value||'';
  const biz3=document.getElementById('f-biz3')?.value||'';

  const acc=DB.accounts.find(a=>a.id===accId);
  const prev=DB.amUpdates.find(x=>x.id===exId)||{};
  if(!acd&&!ncd&&!cs)return sal('Please select a stage or enter at least one date','ae');

  const stageDate=acd||today();
  const row={
    id:exId||uid(),
    account_id:accId,
    partner_id:CU.id,
    connect_stage:cs,
    // Composite action_item for backward compat
    action_item: cs==='Business connect'?[biz1,biz2,biz3].filter(Boolean).join(' | '):cs==='Trials connect'?trialsAI:initAI,
    initial_action_item:initAI,
    trials_action_item:trialsAI,
    biz_action_1:biz1,
    biz_action_2:biz2,
    biz_action_3:biz3,
    connect_date_dm:acd||null,
    next_connect_date_dm:ncd||null,
    initial_date:  cs==='Initial connect'?(acd||stageDate):(prev.initialDate||null),
    trials_date:   cs==='Trials connect' ?(acd||stageDate):(prev.trialsDate||null),
    business_date: cs==='Business connect'?(acd||stageDate):(prev.businessDate||null),
    updated_at:new Date().toISOString()
  };
  const{error}=await SB.from('pt_am_updates').upsert([row]);
  if(error)return sal('Error: '+error.message,'ae');

  const name=acc?.companyName||accId;
  // Audit log each changed field
  if(cs!==prev.connectStage)await sbLog('Updated Connect Stage',name,'connectStage',prev.connectStage||'',cs,{accountId:accId});
  if(acd!==prev.connectDateDM)await sbLog('Updated Connect Date',name,'connectDateDM',prev.connectDateDM||'',acd,{accountId:accId});
  if(ncd!==prev.nextConnectDateDM)await sbLog('Updated Next Connect Date',name,'nextConnectDateDM',prev.nextConnectDateDM||'',ncd,{accountId:accId});
  if(initAI!==(prev.initialActionItem||''))await sbLog('Updated Initial Action Item',name,'initialActionItem',prev.initialActionItem||'',initAI,{accountId:accId});
  if(trialsAI!==(prev.trialsActionItem||''))await sbLog('Updated Trials Action Item',name,'trialsActionItem',prev.trialsActionItem||'',trialsAI,{accountId:accId});
  if(biz1!==(prev.bizAction1||''))await sbLog('Updated Business Action 1',name,'bizAction1',prev.bizAction1||'',biz1,{accountId:accId});
  if(biz2!==(prev.bizAction2||''))await sbLog('Updated Business Action 2',name,'bizAction2',prev.bizAction2||'',biz2,{accountId:accId});
  if(biz3!==(prev.bizAction3||''))await sbLog('Updated Business Action 3',name,'bizAction3',prev.bizAction3||'',biz3,{accountId:accId});

  EDIT_UNLOCKED={initial:false,trials:false};
  sal('AM Connect saved — visible to all users!','as');
}

async function saveAMUpdate(accId,exId){
  await _doSaveAM(accId,exId,'f-cs','f-acd','f-ncd');
}
async function saveAMUpdateAdmin(accId,exId){
  await _doSaveAM(accId,exId,'fa-cs','fa-acd','fa-ncd');
}

/* ─────────────────────────── SAVE: ACCOUNT RECORD ─────────────────────────── */
async function saveAcc(id){
  const cn=(document.getElementById('fa-cn')?.value||'').trim();
  if(!cn)return sal('Company name is required','ae');
  const row={
    id:id||uid(),company_name:cn,company_email:document.getElementById('fa-ce')?.value||'',
    focus_area:document.getElementById('fa-fa')?.value||'',account_group:document.getElementById('fa-ag')?.value||'',
    program_manager:document.getElementById('fa-pm')?.value||'',company_type:document.getElementById('fa-ct')?.value||'',
    account_priority:document.getElementById('fa-ap')?.value||'',opportunity_category:document.getElementById('fa-oc')?.value||'',
    crop:document.getElementById('fa-cr')?.value||'',stage_id:document.getElementById('fa-st')?.value||'',
    overall_status:document.getElementById('fa-os')?.value||'yellow',
    assigned_partner_id:document.getElementById('fa-p')?.value||'',
    admin_action_item:document.getElementById('fa-aai')?.value||'',
    trial_stage:document.getElementById('fa-ts')?.value||'',trial_status:document.getElementById('fa-tst')?.value||'yellow',
    trial_connect_date:document.getElementById('fa-tcd')?.value||null,
    agri_manager:document.getElementById('fa-am')?.value||'',
    remarks:document.getElementById('fa-rm')?.value||'',
    updated_at:new Date().toISOString()
  };
  if(!id)row.created_at=new Date().toISOString();
  const{error}=await SB.from('pt_accounts').upsert([row]);
  if(error)return sal('Error: '+error.message,'ae');
  await sbLog(id?'Updated account record':'Created account record',cn,'overview','',id?'updated':'created',{accountId:row.id});
  const{data:fresh}=await SB.from('pt_accounts').select('*').order('created_at',{ascending:true});
  if(fresh)DB.accounts=fresh.map(mapAcc);
  window._aSel=row.id;
  sal(id?'Account updated!':'Account created!','as');
}

async function delAcc(id){const a=DB.accounts.find(x=>x.id===id);await SB.from('pt_am_updates').delete().eq('account_id',id);await SB.from('pt_accounts').delete().eq('id',id);await sbLog('Deleted account',a?.companyName||id,'','','deleted');window._aSel=null;sal('Account deleted','as');}
async function approveP(id){const p=DB.pendingSignups.find(x=>x.id===id);if(!p)return;await SB.from('pt_users').insert([{id:uid(),name:p.name,email:p.email,password:p.password,role:'partner',status:'active'}]);await SB.from('pt_pending_signups').delete().eq('id',id);await sbLog('Approved partner',p.name,'status','pending','active');sal(`${p.name} approved!`,'as');}
async function rejectP(id){const p=DB.pendingSignups.find(x=>x.id===id);await SB.from('pt_pending_signups').delete().eq('id',id);sal(`${p?.name||'Request'} rejected`,'as');}
async function adminRP(id){const np=document.getElementById('mnp')?.value||'',cp=document.getElementById('mcp')?.value||'';if(np.length<8)return sal('Min 8 chars','ae');if(np!==cp)return sal('Passwords do not match','ae');await SB.from('pt_users').update({password:np}).eq('id',id);closeM();sal('Password reset!','as');}
async function saveProf(){const n=(document.getElementById('men')?.value||'').trim(),e=(document.getElementById('mee')?.value||'').trim();if(!n||!e)return sal('Fields required','ae');if(DB.users.find(u=>u.email===e&&u.id!==CU.id))return sal('Email in use','ae');await SB.from('pt_users').update({name:n,email:e}).eq('id',CU.id);CU.name=n;CU.email=e;sal('Profile updated!','as');}
async function changePw(){const cur=document.getElementById('mec')?.value||'',np=document.getElementById('men2')?.value||'',cp=document.getElementById('mecf')?.value||'';if(cur!==CU.password)return sal('Current password incorrect','ae');if(np.length<8)return sal('Min 8 chars','ae');if(np!==cp)return sal('Passwords do not match','ae');await SB.from('pt_users').update({password:np}).eq('id',CU.id);CU.password=np;sal('Password updated!','as');}
async function savePart(id){const n=(document.getElementById('mn')?.value||'').trim(),e=(document.getElementById('me')?.value||'').trim(),p=id?null:document.getElementById('mp')?.value||'';if(!n||!e||(!id&&!p))return sal('Fields required','ae');if(!id&&p.length<8)return sal('Min 8 chars','ae');if(id){await SB.from('pt_users').update({name:n,email:e}).eq('id',id);}else{if(DB.users.find(u=>u.email===e))return sal('Email in use','ae');await SB.from('pt_users').insert([{id:uid(),name:n,email:e,password:p,role:'partner',status:'active',partner_permissions:{...DEFAULT_PARTNER_PERMS}}]);}closeM();sal('Partner saved!','as');}
async function delPart(id){if(id===CU.id)return sal("Can't remove yourself",'ae');await SB.from('pt_users').delete().eq('id',id);sal('Partner removed','as');}
async function savePartnerPerms(id){const pperms={};Object.keys(PARTNER_PERM_LABELS).forEach(key=>{const el=document.getElementById('pperm-'+key);pperms[key]=el?el.checked:true;});const{error}=await SB.from('pt_users').update({partner_permissions:pperms}).eq('id',id);if(error)return sal('Error: '+error.message,'ae');const u=DB.users.find(x=>x.id===id);if(u)u.partner_permissions=pperms;if(CU.id===id)CU.partner_permissions=pperms;const{data}=await SB.from('pt_users').select('*');if(data)DB.users=data;closeM();sal('Partner access updated!','as',5000);}
async function savePerms(id){const perms={};Object.keys(PERM_LABELS).forEach(key=>{const el=document.getElementById('perm-'+key);perms[key]=el?el.checked:false;});const{error}=await SB.from('pt_users').update({permissions:perms}).eq('id',id);if(error)return sal('Error: '+error.message,'ae');const u=DB.users.find(x=>x.id===id);if(u)u.permissions=perms;if(CU.id===id)CU.permissions=perms;closeM();sal('Permissions updated!','as');}
async function saveAdm(id){const n=(document.getElementById('mn')?.value||'').trim(),e=(document.getElementById('me')?.value||'').trim(),p=id?null:document.getElementById('mp')?.value||'';if(!n||!e||(!id&&!p))return sal('Fields required','ae');if(!id&&p.length<8)return sal('Min 8 chars','ae');if(id){await SB.from('pt_users').update({name:n,email:e}).eq('id',id);}else{if(DB.users.find(u=>u.email===e))return sal('Email in use','ae');await SB.from('pt_users').insert([{id:uid(),name:n,email:e,password:p,role:'admin',status:'active',permissions:{...DEFAULT_PERMS}}]);}closeM();sal('Admin saved!','as');}
async function delAdm(id){if(id===CU.id)return sal("Can't remove yourself",'ae');await SB.from('pt_users').delete().eq('id',id);sal('Admin removed','as');}
async function saveStg(id){const n=(document.getElementById('mn')?.value||'').trim();if(!n)return sal('Stage name required','ae');if(id){await SB.from('pt_stages').update({name:n}).eq('id',id);}else{await SB.from('pt_stages').insert([{id:uid(),name:n,sort_order:DB.stages.length+1}]);}closeM();sal('Stage saved!','as');}
async function delStg(id){await SB.from('pt_stages').delete().eq('id',id);sal('Stage deleted','as');}
async function addDD(key){const inp=document.getElementById('dd-'+key);if(!inp?.value.trim())return;if(!DB.dd[key])DB.dd[key]=[];if(!DB.dd[key].includes(inp.value.trim()))DB.dd[key].push(inp.value.trim());await SB.from('pt_settings').upsert([{key:'ddOptions',value:DB.dd}]);inp.value='';sal('Option added!','as');}
async function rmDD(key,i){DB.dd[key].splice(i,1);await SB.from('pt_settings').upsert([{key:'ddOptions',value:DB.dd}]);sal('Option removed','as');}

});
