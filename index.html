/* Check partner permission */
function canPartner(perm){
  if(!CU)return false;
  if(CU.role==='superadmin'||CU.role==='admin')return true;
  const perms=CU.partner_permissions||{...DEFAULT_PARTNER_PERMS};
  return perms[perm]!==false;
}

function mapAcc(r){return{id:r.id,companyName:r.company_name,companyEmail:r.company_email||'',focusArea:r.focus_area||'',accountGroup:r.account_group||'',programManager:r.program_manager||'',companyType:r.company_type||'',accountPriority:r.account_priority||'',opportunityCategory:r.opportunity_category||'',crop:r.crop||'',stageId:r.stage_id||'',overallStatus:r.overall_status||'yellow',assignedPartnerId:r.assigned_partner_id||'',trials:{stage:r.trial_stage||'',status:r.trial_status||'yellow',connectDate:r.trial_connect_date||'',agriManager:r.agri_manager||'',remarks:r.remarks||''},createdAt:r.created_at?r.created_at.split('T')[0]:today(),updatedAt:r.updated_at?r.updated_at.split('T')[0]:today()};}
function mapAM(r){return{id:r.id,account_id:r.account_id,partnerId:r.partner_id,connectStage:r.connect_stage||'',actionItem:r.action_item||'',connectDateDM:r.connect_date_dm||'',nextConnectDateDM:r.next_connect_date_dm||'',initialDate:r.initial_date||'',trialsDate:r.trials_date||'',businessDate:r.business_date||'',updatedAt:r.updated_at?r.updated_at.split('T')[0]:today()};}

async function sbLoad(){
  const[uR,aR,amR,stR,ddR,pR,auR]=await Promise.all([
    SB.from('pt_users').select('*'),
    SB.from('pt_accounts').select('*').order('created_at',{ascending:true}),
    SB.from('pt_am_updates').select('*'),
    SB.from('pt_stages').select('*').order('sort_order',{ascending:true}),
    SB.from('pt_settings').select('*').eq('key','ddOptions').single(),
    SB.from('pt_pending_signups').select('*'),
    SB.from('pt_audit_log').select('*').order('created_at',{ascending:false}).limit(200),
  ]);
  if(uR.data)DB.users=uR.data;
  if(aR.data)DB.accounts=aR.data.map(mapAcc);
  if(amR.data)DB.amUpdates=amR.data.map(mapAM);
  if(stR.data)DB.stages=stR.data.map(r=>({id:r.id,name:r.name}));
  if(ddR.data&&ddR.data.value)DB.dd=ddR.data.value;
  if(pR.data)DB.pendingSignups=pR.data;
  if(auR.data)DB.auditLog=auR.data.map(r=>({ts:new Date(r.created_at).toLocaleString('en-IN'),user:r.user_name,role:r.user_role,action:r.action,record:r.record_name,field:r.field_name,oldv:r.old_value||'',newv:r.new_value||''}));
}

async function sbSeed(){
  await SB.from('pt_users').upsert(SEED_USERS);
  await SB.from('pt_stages').upsert(SEED_STAGES);
  await SB.from('pt_settings').upsert([{key:'ddOptions',value:SEED_DD}]);
  await SB.from('pt_accounts').upsert(SEED_ACCOUNTS);
  await SB.from('pt_am_updates').upsert(SEED_AM);
}

async function bootDB(){
  const{data:ex}=await SB.from('pt_users').select('id').limit(1);
  if(!ex||ex.length===0)await sbSeed();
  await sbLoad();
  const sid=localStorage.getItem('pt_session');
  if(sid){const u=DB.users.find(x=>x.id===sid&&x.status==='active');if(u){CU={...u};}}
  BOOT=false;R();
  document.getElementById('sync-badge').style.display='block';
  SB.channel('pt-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_accounts'},async()=>{const{data}=await SB.from('pt_accounts').select('*').order('created_at',{ascending:true});if(data){DB.accounts=data.map(mapAcc);R();}})
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_am_updates'},async()=>{const{data}=await SB.from('pt_am_updates').select('*');if(data){DB.amUpdates=data.map(mapAM);R();}})
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_users'},async()=>{const{data}=await SB.from('pt_users').select('*');if(data){DB.users=data;if(CU){const s=DB.users.find(u=>u.id===CU.id&&u.status==='active');if(!s){CU=null;localStorage.removeItem('pt_session');}else CU={...s};}R();}})
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_stages'},async()=>{const{data}=await SB.from('pt_stages').select('*').order('sort_order',{ascending:true});if(data){DB.stages=data.map(r=>({id:r.id,name:r.name}));R();}})
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_settings'},async()=>{const{data}=await SB.from('pt_settings').select('*').eq('key','ddOptions').single();if(data&&data.value){DB.dd=data.value;R();}})
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_pending_signups'},async()=>{const{data}=await SB.from('pt_pending_signups').select('*');if(data){DB.pendingSignups=data;R();}})
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_audit_log'},async()=>{const{data}=await SB.from('pt_audit_log').select('*').order('created_at',{ascending:false}).limit(200);if(data){DB.auditLog=data.map(r=>({ts:new Date(r.created_at).toLocaleString('en-IN'),user:r.user_name,role:r.user_role,action:r.action,record:r.record_name,field:r.field_name,oldv:r.old_value||'',newv:r.new_value||''}));R();}})
    .subscribe();
}

async function sbLog(action,record,field,oldv,newv,extra={}){
  try{
    await SB.from('pt_audit_log').insert([{
      user_name:CU.name,
      user_role:CU.role,
      action,
      record_name:record,
      field_name:field,
      old_value:oldv||'',
      new_value:newv||'',
      user_id:CU.id,
      account_id:extra.accountId||null,
      extra_data:Object.keys(extra).length?JSON.stringify(extra):null,
    }]);
  }catch(e){console.warn('audit log failed:',e);}
}

function rstH(){
  let body='';
  if(RS===1)body=`${fi('Registered email','re',REMAIL,'email')}<button class="abtn abtn-blue" style="width:100%;padding:9px" onclick="rs1()">Send Reset Code</button>`;
  else if(RS===2)body=`<div class="infob">Your reset code (simulating email to <strong>${REMAIL}</strong>):</div><div class="rtok">${DB._rtok||'------'}</div>${fi('Enter code','rt')}<button class="abtn abtn-blue" style="width:100%;padding:9px" onclick="rs2()">Verify</button>`;
  else body=`${fi('New Password','rnp','','password')}${fi('Confirm','rcp','','password')}<button class="abtn abtn-blue" style="width:100%;padding:9px" onclick="rs3()">Set Password</button>`;
  return`<div class="abg"><div class="ac">

async function doLogin(){
  const e=(document.getElementById('le')?.value||'').trim(),p=document.getElementById('lp')?.value||'';
  const u=DB.users.find(x=>x.email===e&&x.password===p&&x.status==='active');
  if(u){CU=u;AL=null;PAGE='dashboard';localStorage.setItem('pt_session',u.id);R();}
  else{const pd=DB.pendingSignups.find(x=>x.email===e);pd?sal('Account pending admin approval.','ai',5000):sal('Invalid email or password','ae');}
}
async function doSignup(){
  const n=(document.getElementById('sn')?.value||'').trim(),e=(document.getElementById('se')?.value||'').trim(),p=document.getElementById('sp')?.value||'',nt=(document.getElementById('snt')?.value||'').trim();
  if(!n||!e||!p)return sal('Required fields missing','ae');
  if(p.length<8)return sal('Password must be at least 8 characters','ae');
  if(DB.users.find(u=>u.email===e)||DB.pendingSignups.find(x=>x.email===e))return sal('Email already registered','ae');
  const{error}=await SB.from('pt_pending_signups').insert([{id:uid(),name:n,email:e,password:p,note:nt,requested_at:today()}]);
  if(error)return sal('Error: '+error.message,'ae');
  ATAB='login';sal('Request submitted! Admin will review shortly.','as',5000);
}
async function rs1(){
  const e=(document.getElementById('re')?.value||'').trim();
  if(!e)return sal('Enter email','ae');
  if(!DB.users.find(u=>u.email===e))return sal('No account found','ae');
  REMAIL=e;const tok=Math.floor(100000+Math.random()*900000).toString();DB._rtok=tok;
  await SB.from('pt_settings').upsert([{key:'reset_'+e,value:{token:tok}}]);
  RS=2;AL=null;R();
}
async function rs2(){
  const entered=(document.getElementById('rt')?.value||'').trim();
  if(!DB._rtok||DB._rtok!==entered)return sal('Invalid code','ae');
  RS=3;AL=null;R();
}
async function rs3(){
  const np=document.getElementById('rnp')?.value||'',cp=document.getElementById('rcp')?.value||'';
  if(np.length<8)return sal('Min 8 chars','ae');
  if(np!==cp)return sal('Passwords do not match','ae');
  await SB.from('pt_users').update({password:np}).eq('email',REMAIL);
  await SB.from('pt_settings').delete().eq('key','reset_'+REMAIL);
  ATAB='login';RS=1;REMAIL='';delete DB._rtok;sal('Password reset! Sign in.','as',4000);
}
async function doLogout(){CU=null;AL=null;ATAB='login';localStorage.removeItem('pt_session');R();}

function enAccs(){return DB.accounts.map(a=>{const am=getAM(a.id);return{...a,am,partnerName:gu(a.assignedPartnerId).name,stageName:gs(a.stageId).name,amOD:am?odD(am.nextConnectDateDM):0,trOD:odD(a.trials.connectDate)};});}
function filtAccs(){
  let r=isA()?enAccs():enAccs().filter(a=>a.assignedPartnerId===CU.id);
  if(FILTERS.status)r=r.filter(a=>a.overallStatus===FILTERS.status);
  if(FILTERS.partner)r=r.filter(a=>a.assignedPartnerId===FILTERS.partner);
  if(FILTERS.stage)r=r.filter(a=>a.stageId===FILTERS.stage);
  if(SEARCH)r=r.filter(a=>a.companyName.toLowerCase().includes(SEARCH.toLowerCase())||a.partnerName.toLowerCase().includes(SEARCH.toLowerCase()));
  if(Object.values(SF).some(Boolean))r=r.filter(a=>{const od=a.amOD>0;const ds=!od&&a.am?.nextConnectDateDM&&(new Date(a.am.nextConnectDateDM)-new Date(today()))/86400000<=3;return(SF.red&&od)||(SF.yellow&&ds)||(SF.green&&a.overallStatus==='green');});
  if(ASGN&&ASGN!=='all')r=r.filter(a=>a.assignedPartnerId===ASGN);
  return r;
}

<tbody>${DB.auditLog.slice(0,50).map(l=>`<tr><td style="font-size:11px;color:var(--muted)">${l.ts}</td><td><strong style="font-size:11px">${l.user}</strong></td><td><span style="background:${l.role==='admin'?'#e8f0fb':'#eafaf1'};color:${l.role==='admin'?'#1a5276':'#145a32'};padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700">${l.role}</span></td><td style="font-size:11px">${l.action}</td><td style="font-size:11px">${l.record}</td><td style="font-size:11px;color:var(--muted)">${l.field}</td><td style="font-size:11px;color:#e74c3c">${l.oldv||'—'}</td><td style="font-size:11px;color:#3aaa5e">${l.newv}</td></tr>`).join('')}</tbody></table></div></div>`;}

function dlCSV(){const sel=COLS.filter(c=>RPTP[c.k]);const hdr=sel.map(c=>c.l).join(',');const rows=enAccs().map(a=>{const v=getRV(a);return sel.map(c=>`"${(v[c.k]??'').toString().replace(/"/g,'""')}"`).join(',');});const csv=[hdr,...rows].join('\n');const a2=document.createElement('a');a2.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a2.download='AgriTrack_Report.csv';a2.click();sal('Downloaded!','as');}
function dlAudit(){const hdr='Timestamp,User,Role,Action,Record,Field,Old,New';const rows=DB.auditLog.map(l=>[l.ts,l.user,l.role,l.action,l.record,l.field,l.oldv,l.newv].map(v=>`"${v}"`).join(','));const csv=[hdr,...rows].join('\n');const a2=document.createElement('a');a2.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a2.download='AgriTrack_AuditLog.csv';a2.click();sal('Downloaded!','as');}

function pgAdmin(){
  if(!isA())return'<div style="text-align:center;padding:40px;color:var(--muted)">Access denied</div>';
  const pts=DB.users.filter(u=>u.role==='partner'),adms=DB.users.filter(u=>u.role==='admin'),dd=DB.dd;

  // SUPERADMIN PANEL — full control

          <button class="abtn-sm btn-red" onclick="delAdm('${a.id}')">Remove</button>
        </div></td>

    </div>
    <table><thead><tr><th>Name</th><th>Email</th><th>Accounts</th><th>Permissions</th><th>Actions</th></tr></thead>
    <tbody>${pts.map(p=>{
      const cnt=DB.accounts.filter(a=>a.assignedPartnerId===p.id).length;
      const pperms=p.partner_permissions||{};

      const ppTotal=Object.keys(PARTNER_PERM_LABELS).length;
      return`<tr>
        <td><div style="display:flex;align-items:center;gap:6px"><div class="av avp" style="width:26px;height:26px;font-size:10px">${p.name.split(' ').map(w=>w[0]).join('').slice(0,2)}</div><strong>${p.name}</strong></div></td>
        <td style="color:var(--muted);font-size:11px">${p.email}</td>
        <td style="font-size:11px;color:#4a7ec7;font-weight:600">${cnt}</td>

  // PENDING SIGNUPS
  const pendingPanel=DB.pendingSignups.length&&can('managePartners')?`

    <div class="ctitle" style="color:#b8860b">Pending Approvals (${DB.pendingSignups.length})</div>

      <div class="av avp">${p.name.split(' ').map(w=>w[0]).join('').slice(0,2)}</div>

  <div class="card" style="margin-bottom:12px"><div class="ctitle">Pipeline Stages</div>

    </tr>`).join('')}</tbody></table>

  </div>`:`<div class="card" style="margin-bottom:12px;border-color:#fde8e8"><div style="padding:16px;text-align:center;color:#e74c3c;font-size:12px">&#x26D4; No permission to manage pipeline stages</div></div>`;

  // DROPDOWN OPTIONS
  const ddPanel=can('manageDropdowns')?`
  <div class="card"><div class="ctitle">Dropdown Options Manager</div>
    ${Object.keys(dd).map(key=>`<div style="margin-bottom:10px;border:1px solid var(--border);border-radius:8px;padding:10px">

      <div style="display:flex;flex-wrap:wrap;min-height:26px;margin-bottom:6px">${(dd[key]||[]).map((o,i)=>`<span class="dtag">${o}<button class="dtag-x" onclick="rmDD('${key}',${i})">&times;</button></span>`).join('')}${!dd[key]?.length?'<span style="font-size:11px;color:var(--muted)">No options yet</span>':''}</div>
      <div style="display:flex;gap:5px"><input type="text" id="dd-${key}" placeholder="New option..." style="flex:1;padding:5px 8px;font-size:12px;border:1px solid var(--border);border-radius:5px;outline:none"><button class="abtn-sm btn-blue" style="padding:4px 10px;white-space:nowrap" onclick="addDD('${key}')">+ Add</button></div>
    </div>`).join('')}
  </div>`:`<div class="card" style="border-color:#fde8e8"><div style="padding:16px;text-align:center;color:#e74c3c;font-size:12px">&#x26D4; No permission to manage dropdown options</div></div>`;

  return`<div class="g2">
<div>${pendingPanel}${saPanel}${partnerPanel}</div>
<div>${stagesPanel}${ddPanel}</div>
</div>`;}


function pgProgress(){
  const myAccs=enAccs().filter(a=>a.assignedPartnerId===CU.id);
  const stages=['Initial connect','Trials connect','Business connect'];
  const stageColors={'Initial connect':'#e6a817','Trials connect':'#4a7ec7','Business connect':'#3aaa5e'};
  const stagePct={'Initial connect':33,'Trials connect':66,'Business connect':100};

  if(!myAccs.length)return'<div class="card"><div style="text-align:center;padding:28px;color:var(--muted)">No accounts assigned yet.</div></div>';

  const done=myAccs.filter(a=>a.am&&a.am.connectStage==='Business connect').length;
  const inProgress=myAccs.filter(a=>a.am&&a.am.connectStage&&a.am.connectStage!=='Business connect').length;
  const notStarted=myAccs.filter(a=>!a.am||!a.am.connectStage).length;
  const avgPct=myAccs.length?Math.round(myAccs.reduce(function(sum,a){return sum+(stagePct[a.am&&a.am.connectStage]||0);},0)/myAccs.length):0;

  let accsHtml='';
  myAccs.forEach(function(a){
    const cs=a.am?a.am.connectStage:'';
    const pct=stagePct[cs]||0;
    const col=stageColors[cs]||'#dde3ec';
    const od=a.amOD>0;
    let milestones='';
    stages.forEach(function(s,i){
      const isDone=(pct>=(i+1)*33);
      const isActive=(cs===s);
      // Show the specific date for each milestone stage
    const stageDateMap={'Initial connect':a.am?a.am.initialDate:'','Trials connect':a.am?a.am.trialsDate:'','Business connect':a.am?a.am.businessDate:''};
    const mDate=stageDateMap[s]||'';
    const dateStr=mDate?'<div style="font-size:9px;color:var(--muted)">'+fmtD(mDate)+'</div>':'';
      milestones+='<div style="flex:1;text-align:center">'
        +'<div style="width:14px;height:14px;border-radius:50%;border:2px solid '+(isDone||isActive?stageColors[s]:'#dde3ec')+';background:'+(isDone?stageColors[s]:'#fff')+';margin:0 auto 3px;display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff">'+(isDone?'&#x2713;':'')+'</div>'
        +'<div style="font-size:9px;color:'+(isActive?stageColors[s]:'var(--muted)')+';font-weight:'+(isActive?'700':'400')+'">'+s+'</div>'+dateStr+'</div>';
    });
    const actionHtml=a.am&&a.am.actionItem?'<div style="margin-top:6px;font-size:11px;color:#4a5568"><span style="color:var(--muted)">Action:</span> '+a.am.actionItem+'</div>':'';
    accsHtml+='<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #f0f3f8">'
      +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">'
      +'<div><div style="font-size:13px;font-weight:700">'+a.companyName+'</div>'
      +'<div style="font-size:11px;color:var(--muted);margin-top:2px">'+a.accountGroup+' &middot; '+a.stageName+'</div></div>'
      +'<div style="display:flex;gap:6px;align-items:center">'
      +(cs?'<span style="background:'+col+'22;color:'+col+';border:1px solid '+col+'44;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:700">'+cs+'</span>':'<span style="background:#f4f6fb;color:var(--muted);padding:2px 10px;border-radius:12px;font-size:11px">Not started</span>')
      +(od?'<span class="oday">+'+a.amOD+'d OD</span>':'')
      +'<span style="font-size:14px;font-weight:800;color:'+(col||'var(--muted)')+'">'+pct+'%</span></div></div>'
      +'<div style="background:#f0f3f8;border-radius:8px;height:8px;overflow:hidden;margin-bottom:6px">'
      +'<div style="background:'+(col||'#dde3ec')+';height:100%;width:'+pct+'%;border-radius:8px"></div></div>'
      +'<div style="display:flex;gap:0">'+milestones+'</div>'
      +actionHtml+'</div>';
  });

  return '<div style="font-size:17px;font-weight:700;margin-bottom:3px">My Progress Report</div>'
    +'<div style="font-size:12px;color:var(--muted);margin-bottom:16px">Track your AM Connect progress across all assigned accounts.</div>'
    +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">'
    +'<div class="kcard kc-b"><div class="klbl">Total Accounts</div><div class="knum">'+myAccs.length+'</div></div>'
    +'<div class="kcard kc-g"><div class="klbl">Business Connect</div><div class="knum">'+done+'</div><div class="ksub">Completed</div></div>'
    +'<div class="kcard kc-y"><div class="klbl">In Progress</div><div class="knum">'+inProgress+'</div><div class="ksub">Ongoing</div></div>'
    +'<div class="kcard kc-r"><div class="klbl">Not Started</div><div class="knum">'+notStarted+'</div><div class="ksub">Pending</div></div></div>'
    +'<div class="card" style="margin-bottom:16px">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
    +'<div class="ctitle" style="margin-bottom:0">Overall Portfolio Progress</div>'
    +'<div style="font-size:20px;font-weight:800;color:#4a7ec7">'+avgPct+'%</div></div>'
    +'<div style="background:#f0f3f8;border-radius:10px;height:12px;overflow:hidden">'
    +'<div style="background:linear-gradient(90deg,#4a7ec7,#3aaa5e);height:100%;width:'+avgPct+'%;border-radius:10px"></div></div>'
    +'<div style="display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:var(--muted)">'
    +'<span>Initial Connect (33%)</span><span>Trials Connect (66%)</span><span>Business Connect (100%)</span></div></div>'
    +'<div class="card"><div class="ctitle">Account-wise Progress</div>'+accsHtml+'</div>';
}

function pgAdminProgress(){
  if(!isA())return'<div style="text-align:center;padding:40px;color:var(--muted)">Access denied</div>';
  const all=enAccs();
  const pts=DB.users.filter(u=>u.role==='partner');
  const stageColors={'Initial connect':'#e6a817','Trials connect':'#4a7ec7','Business connect':'#3aaa5e'};
  const stagePct={'Initial connect':33,'Trials connect':66,'Business connect':100};

  const amRows=pts.map(p=>{
    const pa=all.filter(a=>a.assignedPartnerId===p.id);
    if(!pa.length)return null;
    const done=pa.filter(a=>a.am&&a.am.connectStage==='Business connect').length;
    const inProg=pa.filter(a=>a.am&&a.am.connectStage&&a.am.connectStage!=='Business connect').length;
    const notStarted=pa.filter(a=>!a.am||!a.am.connectStage).length;
    const avg=pa.length?Math.round(pa.reduce((s,a)=>s+(stagePct[a.am&&a.am.connectStage]||0),0)/pa.length):0;
    return{p,pa,done,inProg,notStarted,avg};
  }).filter(Boolean);

  const companyRows=all.map(a=>({
    name:a.companyName,group:a.accountGroup,am:a.partnerName,
    stage:a.am?a.am.connectStage:'',
    pct:a.am?stagePct[a.am.connectStage]||0:0,
    od:a.amOD,status:a.overallStatus,
  }));

  function buildAMCard(row){
    const{p,pa,done,inProg,notStarted,avg}=row;
    let accs='';
    pa.forEach(function(a){
      const cs=a.am?a.am.connectStage:'';
      const pct=stagePct[cs]||0;
      const col=stageColors[cs]||'#dde3ec';
      const odTag=a.amOD>0?'<span class="oday" style="font-size:9px">+'+a.amOD+'d</span>':'<span style="color:#3aaa5e;font-weight:600">'+pct+'%</span>';
      accs+='<div style="padding:7px 9px;border:1px solid '+(a.amOD>0?'#f5b7b1':'var(--border)')+';border-radius:7px;background:'+(a.amOD>0?'#fff8f8':'#fafbfe')+'">'
        +'<div style="font-size:11px;font-weight:700;margin-bottom:4px">'+a.companyName+'</div>'
        +'<div style="background:#f0f3f8;border-radius:5px;height:5px;overflow:hidden;margin-bottom:4px">'
        +'<div style="background:'+col+';height:100%;width:'+pct+'%;border-radius:5px"></div></div>'
        +'<div style="display:flex;justify-content:space-between;font-size:10px">'
        +'<span style="color:'+col+';font-weight:600">'+(cs||'Not started')+'</span>'+odTag
        +'</div></div>';
    });
    const initials=p.name.split(' ').map(function(w){return w[0];}).join('').slice(0,2);
    return '<div style="margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid #f0f3f8">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
      +'<div style="display:flex;align-items:center;gap:8px">'
      +'<div class="av avp" style="width:32px;height:32px;font-size:11px">'+initials+'</div>'
      +'<div><div style="font-size:13px;font-weight:700">'+p.name+'</div>'
      +'<div style="font-size:11px;color:var(--muted)">'+pa.length+' accounts &middot; '+done+' completed &middot; '+inProg+' in progress &middot; '+notStarted+' not started</div></div></div>'
      +'<div style="font-size:22px;font-weight:800;color:#4a7ec7">'+avg+'%</div></div>'
      +'<div style="background:#f0f3f8;border-radius:8px;height:10px;overflow:hidden;margin-bottom:8px">'
      +'<div style="background:linear-gradient(90deg,#4a7ec7,#3aaa5e);height:100%;width:'+avg+'%;border-radius:8px"></div></div>'
      +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:7px">'+accs+'</div></div>';
  }

  function buildCompanyRow(r){
    const col=stageColors[r.stage]||'var(--muted)';
    const bg=stageColors[r.stage]?(stageColors[r.stage]+'22'):'#f4f6fb';
    const border=stageColors[r.stage]?(stageColors[r.stage]+'44'):'#dde3ec';
    const pill=r.status==='red'?'p-red':r.status==='yellow'?'p-yellow':'p-green';
    const odCell=r.od>0?'<span class="oday">+'+r.od+'d</span>':'<span style="color:#3aaa5e;font-size:11px">OK</span>';
    return '<tr>'
      +'<td><strong style="font-size:12px">'+r.name+'</strong></td>'
      +'<td style="font-size:11px;color:var(--muted)">'+(r.group||'—')+'</td>'
      +'<td style="font-size:11px">'+r.am+'</td>'
      +'<td><span style="background:'+bg+';color:'+col+';border:1px solid '+border+';padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600">'+(r.stage||'Not started')+'</span></td>'
      +'<td><div style="display:flex;align-items:center;gap:7px">'
      +'<div style="background:#f0f3f8;border-radius:5px;height:6px;width:80px;overflow:hidden">'
      +'<div style="background:'+(stageColors[r.stage]||'#dde3ec')+';height:100%;width:'+r.pct+'%;border-radius:5px"></div></div>'
      +'<span style="font-size:11px;font-weight:700;color:'+col+'">'+r.pct+'%</span></div></td>'
      +'<td><span class="pill '+pill+'" style="font-size:10px">'+r.status+'</span></td>'
      +'<td>'+odCell+'</td></tr>';
  }

  const totalAcc=all.length;
  const bizDone=all.filter(a=>a.am&&a.am.connectStage==='Business connect').length;
  const inProg=all.filter(a=>a.am&&a.am.connectStage&&a.am.connectStage!=='Business connect').length;
  const notStarted=all.filter(a=>!a.am||!a.am.connectStage).length;

  let amHtml='';amRows.forEach(function(r){amHtml+=buildAMCard(r);});
  let compHtml='';companyRows.forEach(function(r){compHtml+=buildCompanyRow(r);});

  return '<div style="font-size:17px;font-weight:700;margin-bottom:3px">Progress Report</div>'
    +'<div style="font-size:12px;color:var(--muted);margin-bottom:14px">Company-wise and Alliance Manager-based progress overview.</div>'
    +'<button class="abtn" style="background:#3aaa5e;color:#fff;padding:7px 16px;margin-bottom:16px" onclick="dlProgressCSV()">&#8595; Download Progress Report CSV</button>'
    +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">'
    +'<div class="kcard kc-b"><div class="klbl">Total Accounts</div><div class="knum">'+totalAcc+'</div></div>'
    +'<div class="kcard kc-g"><div class="klbl">Business Connect</div><div class="knum">'+bizDone+'</div><div class="ksub">Completed</div></div>'
    +'<div class="kcard kc-y"><div class="klbl">In Progress</div><div class="knum">'+inProg+'</div></div>'

function dlProgressCSV(){
  const all=enAccs();
  const stages={'Initial connect':33,'Trials connect':66,'Business connect':100};
  const hdr='Company,Group,Alliance Manager,Connect Stage,Progress %,Overall Status,AM Overdue Days,Connect Date,Next Connect Date,Action Item';
  const rows=all.map(a=>[
    `"${a.companyName}"`,`"${a.accountGroup}"`,`"${a.partnerName}"`,
    `"${a.am?.connectStage||''}"`,
    stages[a.am?.connectStage]||0,
    `"${a.overallStatus}"`,
    a.amOD||0,
    `"${a.am?.connectDateDM||''}"`,
    `"${a.am?.nextConnectDateDM||''}"`,
    `"${a.am?.actionItem||''}"`
  ].join(','));
  const csv=[hdr,...rows].join('\n');
  const a2=document.createElement('a');
  a2.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a2.download='AgriTrack_ProgressReport.csv';
  a2.click();
  sal('Progress report downloaded!','as');
}

async function saveAMUpdate(accId,exId){
  const cs=document.getElementById('f-cs')?.value||'',acd=document.getElementById('f-acd')?.value||'',ncd=document.getElementById('f-ncd')?.value||'',ai=document.getElementById('f-ai')?.value||'';
  const acc=DB.accounts.find(a=>a.id===accId);
  const prev=DB.amUpdates.find(x=>x.id===exId)||{};
  if(!acd&&!ncd)return sal('Please enter at least one date','ae');
  const stageDate=acd||today();
  const row={
    id:exId||uid(),
    account_id:accId,
    partner_id:CU.id,
    connect_stage:cs,
    action_item:ai,
    connect_date_dm:acd||null,
    next_connect_date_dm:ncd||null,
    // Auto-record stage date when stage changes — preserve previous stage dates
    initial_date:  cs==='Initial connect'  ? (acd||stageDate) : (prev.initialDate||null),
    trials_date:   cs==='Trials connect'   ? (acd||stageDate) : (prev.trialsDate||null),
    business_date: cs==='Business connect' ? (acd||stageDate) : (prev.businessDate||null),
    updated_at:new Date().toISOString()
  };
  const{error}=await SB.from('pt_am_updates').upsert([row]);
  if(error)return sal('Error: '+error.message,'ae');
  // Log detailed audit entries per field
  if(cs!==prev.connectStage)await sbLog('Updated Connect Stage',acc?.companyName||accId,'connectStage',prev.connectStage||'',cs,{accountId:accId,userId:CU.id});
  if(acd!==prev.connectDateDM)await sbLog('Updated Connect Date',acc?.companyName||accId,'connectDateDM',prev.connectDateDM||'',acd,{accountId:accId,userId:CU.id});
  if(ncd!==prev.nextConnectDateDM)await sbLog('Updated Next Connect Date',acc?.companyName||accId,'nextConnectDateDM',prev.nextConnectDateDM||'',ncd,{accountId:accId,userId:CU.id});
  if(ai!==prev.actionItem)await sbLog('Updated Action Item',acc?.companyName||accId,'actionItem',prev.actionItem||'',ai,{accountId:accId,userId:CU.id});
  sal('AM Connect saved — visible to all users!','as');
}

async function saveAcc(id){
  const cn=(document.getElementById('fa-cn')?.value||'').trim();
  if(!cn)return sal('Company name is required','ae');
  const row={id:id||uid(),company_name:cn,company_email:document.getElementById('fa-ce')?.value||'',focus_area:document.getElementById('fa-fa')?.value||'',account_group:document.getElementById('fa-ag')?.value||'',program_manager:document.getElementById('fa-pm')?.value||'',company_type:document.getElementById('fa-ct')?.value||'',account_priority:document.getElementById('fa-ap')?.value||'',opportunity_category:document.getElementById('fa-oc')?.value||'',crop:document.getElementById('fa-cr')?.value||'',stage_id:document.getElementById('fa-st')?.value||'',overall_status:document.getElementById('fa-os')?.value||'yellow',assigned_partner_id:document.getElementById('fa-p')?.value||'',trial_stage:document.getElementById('fa-ts')?.value||'',trial_status:document.getElementById('fa-tst')?.value||'yellow',trial_connect_date:document.getElementById('fa-tcd')?.value||null,agri_manager:document.getElementById('fa-am')?.value||'',remarks:document.getElementById('fa-rm')?.value||'',updated_at:new Date().toISOString()};
  if(!id)row.created_at=new Date().toISOString();
  const{error}=await SB.from('pt_accounts').upsert([row]);
  if(error)return sal('Error: '+error.message,'ae');
  await sbLog(id?'Updated account record':'Created account record',cn,'overview','',id?'updated':'created',{accountId:row.id,userId:CU.id});
  // Force reload accounts immediately — don't wait for realtime
  const{data:fresh}=await SB.from('pt_accounts').select('*').order('created_at',{ascending:true});
  if(fresh)DB.accounts=fresh.map(mapAcc);
  window._aSel=row.id;sal(id?'Account updated!':'Account created!','as');
}

async function delAcc(id){
  const a=DB.accounts.find(x=>x.id===id);
  await SB.from('pt_am_updates').delete().eq('account_id',id);
  await SB.from('pt_accounts').delete().eq('id',id);
  await sbLog('Deleted account',a?.companyName||id,'','','deleted');
  window._aSel=null;sal('Account deleted','as');
}

async function approveP(id){const p=DB.pendingSignups.find(x=>x.id===id);if(!p)return;await SB.from('pt_users').insert([{id:uid(),name:p.name,email:p.email,password:p.password,role:'partner',status:'active'}]);await SB.from('pt_pending_signups').delete().eq('id',id);await sbLog('Approved partner',p.name,'status','pending','active');sal(`${p.name} approved!`,'as');}
async function rejectP(id){const p=DB.pendingSignups.find(x=>x.id===id);await SB.from('pt_pending_signups').delete().eq('id',id);sal(`${p?.name||'Request'} rejected`,'as');}
async function adminRP(id){const np=document.getElementById('mnp')?.value||'',cp=document.getElementById('mcp')?.value||'';if(np.length<8)return sal('Min 8 chars','ae');if(np!==cp)return sal('Passwords do not match','ae');await SB.from('pt_users').update({password:np}).eq('id',id);closeM();sal('Password reset!','as');}
async function saveProf(){const n=(document.getElementById('men')?.value||'').trim(),e=(document.getElementById('mee')?.value||'').trim();if(!n||!e)return sal('Fields required','ae');if(DB.users.find(u=>u.email===e&&u.id!==CU.id))return sal('Email in use','ae');await SB.from('pt_users').update({name:n,email:e}).eq('id',CU.id);CU.name=n;CU.email=e;sal('Profile updated!','as');}
async function changePw(){const cur=document.getElementById('mec')?.value||'',np=document.getElementById('men2')?.value||'',cp=document.getElementById('mecf')?.value||'';if(cur!==CU.password)return sal('Current password incorrect','ae');if(np.length<8)return sal('Min 8 chars','ae');if(np!==cp)return sal('Passwords do not match','ae');await SB.from('pt_users').update({password:np}).eq('id',CU.id);CU.password=np;sal('Password updated!','as');}
async function savePart(id){const n=(document.getElementById('mn')?.value||'').trim(),e=(document.getElementById('me')?.value||'').trim(),p=id?null:document.getElementById('mp')?.value||'';if(!n||!e||(!id&&!p))return sal('Fields required','ae');if(!id&&p.length<8)return sal('Min 8 chars','ae');if(id){await SB.from('pt_users').update({name:n,email:e}).eq('id',id);}else{if(DB.users.find(u=>u.email===e))return sal('Email in use','ae');await SB.from('pt_users').insert([{id:uid(),name:n,email:e,password:p,role:'partner',status:'active',partner_permissions:{...DEFAULT_PARTNER_PERMS}}]);}closeM();sal('Partner saved!','as');}
async function delPart(id){if(id===CU.id)return sal("Can't remove yourself",'ae');await SB.from('pt_users').delete().eq('id',id);sal('Partner removed','as');}
async function savePartnerPerms(id){
  const pperms={};
  Object.keys(PARTNER_PERM_LABELS).forEach(key=>{
    const el=document.getElementById('pperm-'+key);
    pperms[key]=el?el.checked:true;
  });
  const{error}=await SB.from('pt_users').update({partner_permissions:pperms}).eq('id',id);
  if(error)return sal('Error saving access: '+error.message,'ae');
  const u=DB.users.find(x=>x.id===id);
  if(u)u.partner_permissions=pperms;
  if(CU.id===id){CU.partner_permissions=pperms;}
  // Reload users so UI reflects immediately
  const{data}=await SB.from('pt_users').select('*');
  if(data)DB.users=data;
  closeM();sal('Partner access updated — changes take effect on their next login!','as',5000);
}

async function savePerms(id){
  const perms={};
  Object.keys(PERM_LABELS).forEach(key=>{
    const el=document.getElementById('perm-'+key);
    perms[key]=el?el.checked:false;
  });
  const{error}=await SB.from('pt_users').update({permissions:perms}).eq('id',id);
  if(error)return sal('Error saving permissions: '+error.message,'ae');
  // Update local DB
  const u=DB.users.find(x=>x.id===id);
  if(u)u.permissions=perms;
  // If editing current user, update CU
  if(CU.id===id)CU.permissions=perms;
  closeM();sal('Permissions updated!','as');
}

async function saveAdm(id){const n=(document.getElementById('mn')?.value||'').trim(),e=(document.getElementById('me')?.value||'').trim(),p=id?null:document.getElementById('mp')?.value||'';if(!n||!e||(!id&&!p))return sal('Fields required','ae');if(!id&&p.length<8)return sal('Min 8 chars','ae');if(id){await SB.from('pt_users').update({name:n,email:e}).eq('id',id);}else{if(DB.users.find(u=>u.email===e))return sal('Email in use','ae');await SB.from('pt_users').insert([{id:uid(),name:n,email:e,password:p,role:'admin',status:'active',permissions:{...DEFAULT_PERMS}}]);}closeM();sal('Admin saved!','as');}
async function delAdm(id){if(id===CU.id)return sal("Can't remove yourself",'ae');await SB.from('pt_users').delete().eq('id',id);sal('Admin removed','as');}
async function saveStg(id){const n=(document.getElementById('mn')?.value||'').trim();if(!n)return sal('Stage name required','ae');if(id){await SB.from('pt_stages').update({name:n}).eq('id',id);}else{await SB.from('pt_stages').insert([{id:uid(),name:n,sort_order:DB.stages.length+1}]);}closeM();sal('Stage saved!','as');}
async function delStg(id){await SB.from('pt_stages').delete().eq('id',id);sal('Stage deleted','as');}
async function addDD(key){const inp=document.getElementById('dd-'+key);if(!inp?.value.trim())return;if(!DB.dd[key])DB.dd[key]=[];if(!DB.dd[key].includes(inp.value.trim()))DB.dd[key].push(inp.value.trim());await SB.from('pt_settings').upsert([{key:'ddOptions',value:DB.dd}]);inp.value='';sal('Option added!','as');}
async function rmDD(key,i){DB.dd[key].splice(i,1);await SB.from('pt_settings').upsert([{key:'ddOptions',value:DB.dd}]);sal('Option removed','as');}
