<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AgriTrack — Live Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#eef2f7;color:#1a1a2e;min-height:100vh;font-size:13px}
:root{--hdr:#4a7ec7;--border:#dde3ec;--muted:#7a8499}
.app{min-height:100vh;display:flex;flex-direction:column}
.topbar{background:var(--hdr);padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar h1{font-size:16px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px}
.live-dot{width:8px;height:8px;border-radius:50%;background:#3aaa5e;animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.topbar-r{display:flex;align-items:center;gap:8px}
.ubtn{background:#ffffff33;color:#fff;border:none;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer}
.ubtn:hover{background:#ffffff44}
.nav-tabs{display:flex;background:#3a6ab0;flex-wrap:wrap}
.ntab{padding:9px 16px;font-size:12px;color:#c8d9f5;cursor:pointer;border-bottom:3px solid transparent;font-weight:500;border:none;background:none}
.ntab:hover{color:#fff;background:#4578c4}
.ntab.act{color:#fff;border-bottom:3px solid #fff;background:#4578c4}
.content{flex:1;padding:16px;overflow-y:auto}
.pg{display:none}.pg.act{display:block}
.krow{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:16px}
.kcard{border-radius:10px;padding:12px 14px;color:#fff}
.kc-b{background:#4a7ec7}.kc-r{background:#e74c3c}.kc-y{background:#e6a817}.kc-g{background:#3aaa5e}.kc-p{background:#c0392b}
.klbl{font-size:10px;font-weight:700;opacity:.9;text-transform:uppercase;letter-spacing:.5px}
.knum{font-size:28px;font-weight:800;line-height:1.1}
.ksub{font-size:10px;opacity:.8;margin-top:1px}
.card{background:#fff;border-radius:10px;border:1px solid var(--border);padding:14px;margin-bottom:12px}
.ctitle{font-size:13px;font-weight:700;color:#1a1a2e;margin-bottom:10px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{padding:7px 9px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);background:#f4f6fb;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:7px 9px;border-bottom:1px solid #f0f3f8;color:#2d3748;vertical-align:middle}
tr:hover td{background:#fafbfe}
.tscroll{overflow-x:auto}
.pill{display:inline-block;padding:2px 9px;border-radius:12px;font-size:11px;font-weight:700}
.p-red{background:#e74c3c;color:#fff}.p-yellow{background:#e6a817;color:#fff}.p-green{background:#3aaa5e;color:#fff}.p-na{background:#7a8499;color:#fff}
.oday{background:#fdecea;color:#c0392b;padding:2px 6px;border-radius:5px;font-weight:700;font-size:11px}
.sh{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:6px;font-size:12px;font-weight:700;margin-bottom:12px}
.sh-ov{background:#e8f0fb;color:#1a5276}
.sh-am{background:#bdd7f5;color:#0a3d6b}
.sh-tr{background:#d4f5e2;color:#145a32}
.od-disp{background:#fff3cd;border:1px solid #ffc107;border-radius:6px;padding:6px 10px;font-size:12px;font-weight:600;color:#856404}
.ro-box{background:#f4f6fb;border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;color:#4a5568;min-height:34px}
.fg{display:flex;flex-direction:column;gap:3px;margin-bottom:9px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
.fg4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:9px}
.fl{font-size:11px;font-weight:700;color:#4a5568}
.full{grid-column:1/-1}
select,input[type=text],input[type=email],input[type=password],input[type=date],textarea{padding:6px 9px;border:1px solid var(--border);border-radius:6px;font-size:12px;color:#1a1a2e;background:#fff;outline:none;width:100%}
select:focus,input:focus,textarea:focus{border-color:#4a7ec7}
textarea{resize:vertical;min-height:60px}
.abtn{padding:7px 16px;border-radius:7px;border:none;font-size:12px;font-weight:700;cursor:pointer}
.abtn-blue{background:#4a7ec7;color:#fff}.abtn-blue:hover{background:#3a6ab0}
.abtn-sm{padding:3px 9px;font-size:11px;font-weight:600;border-radius:5px;border:none;cursor:pointer}
.btn-blue{background:#4a7ec7;color:#fff}.btn-red{background:#e74c3c;color:#fff}.btn-yel{background:#e6a817;color:#fff}.btn-grn{background:#3aaa5e;color:#fff}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}.btn-ghost:hover{background:#f4f6fb}
.csp{padding:4px 12px;border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:11px;font-weight:600;color:var(--muted);background:#fff}
.csp.sel{background:#4a7ec7;color:#fff;border-color:#4a7ec7}
.dtag{display:inline-flex;align-items:center;gap:3px;background:#e8f0fb;color:#1a5276;padding:2px 8px;border-radius:12px;font-size:11px;margin:2px}
.dtag-x{background:none;border:none;cursor:pointer;color:#c0392b;font-weight:700;font-size:12px;line-height:1;padding:0 1px}
.acc-card{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:9px;cursor:pointer}
.acc-card:hover{border-color:#4a7ec7;background:#f8fbff}
.abg{min-height:100vh;background:#3a6ab0;display:flex;align-items:center;justify-content:center}
.ac{background:#fff;border-radius:14px;padding:28px;width:380px;max-width:96vw}
.alogo h2{font-size:16px;font-weight:800;color:#4a7ec7;text-align:center;margin-bottom:2px}
.alogo p{font-size:11px;color:var(--muted);text-align:center;margin-bottom:20px}
.atabs{display:flex;border-bottom:2px solid #e2e8f0;margin-bottom:16px}
.atab{padding:6px 14px;font-size:12px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-2px;background:none;border-top:none;border-left:none;border-right:none;font-weight:500}
.atab.act{color:#4a7ec7;border-bottom-color:#4a7ec7;font-weight:700}
.steps{display:flex;gap:5px;margin-bottom:16px}
.step{flex:1;height:3px;border-radius:2px}
.alert{padding:8px 11px;border-radius:6px;font-size:12px;margin-bottom:10px}
.as{background:#eafaf1;color:#1e8449;border:1px solid #a9dfbf}
.ae{background:#fdecea;color:#c0392b;border:1px solid #f5b7b1}
.ai{background:#e8f0fb;color:#1a5276;border:1px solid #b5d4f4}
.blk{background:none;border:none;color:#4a7ec7;cursor:pointer;font-size:12px;padding:0;text-decoration:underline}
.infob{background:#e8f0fb;border:1px solid #b5d4f4;border-radius:6px;padding:8px 11px;font-size:11px;color:#1a5276;margin-bottom:10px}
.rtok{background:#1a1a2e;color:#3aaa5e;font-family:monospace;padding:8px;border-radius:6px;font-size:14px;margin:6px 0;text-align:center;letter-spacing:3px}
.prow{display:flex;align-items:center;gap:9px;padding:9px;border:1px solid #f5d47a;background:#fffbf0;border-radius:8px;margin-bottom:7px}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:10px;flex-shrink:0}
.ava{background:#fdecea;color:#c0392b}.avp{background:#eafaf1;color:#1e8449}.avs{background:#f3e5f5;color:#7b1fa2}
.mo{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:300;padding:14px}
.mc{background:#fff;border-radius:12px;padding:20px;width:500px;max-width:100%;max-height:90vh;overflow-y:auto}
.mt{font-size:14px;font-weight:700;margin-bottom:12px;color:#1a1a2e}
.ma{display:flex;gap:7px;justify-content:flex-end;margin-top:14px;padding-top:12px;border-top:1px solid #f0f3f8}
.tf-g{display:flex;flex-direction:column;gap:2px}
.tf-l{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.tf-s{padding:4px 9px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:#fff;color:#1a1a2e;outline:none;min-width:100px}
.pag{display:flex;align-items:center;gap:4px;margin-top:9px;justify-content:flex-end}
.pb{padding:3px 8px;border:1px solid var(--border);border-radius:4px;background:#fff;cursor:pointer;color:#4a7ec7;font-size:11px}
.pb.cur{background:#4a7ec7;color:#fff}
.rcheck{display:flex;align-items:center;gap:6px;padding:6px 9px;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:11px}
.rcheck.on{background:#e8f0fb;border-color:#4a7ec7;color:#1a5276}
.rcheck input[type=checkbox]{width:13px;height:13px;accent-color:#4a7ec7}
.rp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:9px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px}
.nfbtn{background:#4a7ec7;color:#fff;border:none;padding:6px 14px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer}
.divlbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:3px 0;border-bottom:1px solid var(--border);margin-bottom:10px}
.banner{border-radius:7px;padding:8px 12px;font-size:11px;margin-bottom:12px}
.banner-blue{background:#e8f0fb;border:1px solid #b5d4f4;color:#1a5276}
.banner-green{background:#eafaf1;border:1px solid #a9dfbf;color:#145a32}
.banner-orange{background:#fff8f0;border:1px solid #ffcc80;color:#e65100}
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:#eef2f7}
.spinner{width:40px;height:40px;border:3px solid #dde3ec;border-top-color:#4a7ec7;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sync-badge{position:fixed;bottom:12px;right:12px;background:#1a1a2e;color:#3aaa5e;font-size:10px;font-weight:600;padding:4px 10px;border-radius:12px;z-index:200;opacity:.85;display:none}
.stage-ai-block{border-radius:6px;padding:10px 12px;margin-bottom:8px;border:1px solid var(--border);background:#f9fbff}
.stage-ai-block.initial{background:#fffef5;border-color:#e8e0b0}
.stage-ai-block.trials{background:#f5fbf5;border-color:#b8ddb8}
.stage-ai-block.biz{background:#f5f8fd;border-color:#b5d4f4}
.stage-ai-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.stage-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted)}
.badge-initial{color:#b8860b}
.badge-trials{color:#2e7d32}
.badge-biz{color:#1565c0}
.btn-edit-toggle{background:#f4f6fb;border:1px solid var(--border);color:var(--muted);padding:2px 9px;font-size:10px;font-weight:600;border-radius:5px;cursor:pointer}
.btn-edit-toggle.active{background:#e8f0fb;border-color:#4a7ec7;color:#1a5276}
.ro-locked{background:#f4f6fb;border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:12px;color:#4a5568;min-height:34px}
.admin-ai-block{background:transparent;border:none;padding:0;margin-bottom:0}
.admin-ai-label{font-size:11px;font-weight:700;color:#4a5568;display:flex;align-items:center;gap:4px;margin-bottom:3px}
</style>
</head>

/* Smart display name — skips honorifics so "Dr. Gururaj" → "Gururaj" not "Dr." */
function getDisplayName(fullName,maxLen=14){
  const honorifics=['dr.','mr.','mrs.','ms.','prof.','sr.','jr.','dr'];
  const parts=(fullName||'').split(' ');
  const filtered=parts.filter(w=>!honorifics.includes(w.toLowerCase().replace('.','').replace('.','')));
  const name=(filtered.length?filtered:parts).join(' ');
  return name.length>maxLen?name.slice(0,maxLen-1)+'…':name;
}

/* ─────────────────────────── DB LOAD / SEED ─────────────────────────── */
async function sbLoad(){
  const[uR,aR,amR,stR,ddR,pR,auR,sdR]=await Promise.all([
    SB.from('pt_users').select('*'),
    SB.from('pt_accounts').select('*').order('created_at',{ascending:true}),
    SB.from('pt_am_updates').select('*'),
    SB.from('pt_stages').select('*').order('sort_order',{ascending:true}),
    SB.from('pt_settings').select('*').eq('key','ddOptions').single(),
    SB.from('pt_pending_signups').select('*'),
    SB.from('pt_audit_log').select('*').order('created_at',{ascending:false}).limit(200),
    SB.from('pt_stage_data').select('*'),
  ]);
  if(uR.data)DB.users=uR.data;
  if(aR.data)DB.accounts=aR.data.map(mapAcc);
  if(amR.data)DB.amUpdates=amR.data.map(mapAM);
  if(stR.data)DB.stages=stR.data.map(r=>({id:r.id,name:r.name}));
  if(ddR.data&&ddR.data.value)DB.dd=ddR.data.value;
  if(pR.data)DB.pendingSignups=pR.data;
  if(auR.data)DB.auditLog=auR.data.map(r=>({ts:new Date(r.created_at).toLocaleString('en-IN'),user:r.user_name,role:r.user_role,action:r.action,record:r.record_name,field:r.field_name,oldv:r.old_value||'',newv:r.new_value||''}));
  if(sdR.data)DB.stageData=sdR.data.map(mapStageData);
}

function getSDStage(accountId,stage){return DB.stageData.find(s=>s.accountId===accountId&&s.stage===stage)||null;}
async function sbSeed(){
  await SB.from('pt_users').upsert(SEED_USERS);
  await SB.from('pt_stages').upsert(SEED_STAGES);
  await SB.from('pt_settings').upsert([{key:'ddOptions',value:SEED_DD}]);
  await SB.from('pt_accounts').upsert(SEED_ACCOUNTS);
  await SB.from('pt_am_updates').upsert(SEED_AM);
}
async function bootDB(){
  const{data:ex}=await SB.from('pt_users').select('id').limit(1);
  if(!ex||ex.length===0)await sbSeed();
  await sbLoad();
  const sid=localStorage.getItem('pt_session');
  if(sid){const u=DB.users.find(x=>x.id===sid&&x.status==='active');if(u){CU={...u};}}
  BOOT=false;R();
  document.getElementById('sync-badge').style.display='block';
  SB.channel('pt-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_accounts'},async()=>{const{data}=await SB.from('pt_accounts').select('*').order('created_at',{ascending:true});if(data){DB.accounts=data.map(mapAcc);R();}})
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_am_updates'},async()=>{const{data}=await SB.from('pt_am_updates').select('*');if(data){DB.amUpdates=data.map(mapAM);R();}})
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_users'},async()=>{const{data}=await SB.from('pt_users').select('*');if(data){DB.users=data;if(CU){const s=DB.users.find(u=>u.id===CU.id&&u.status==='active');if(!s){CU=null;localStorage.removeItem('pt_session');}else CU={...s};}R();}})
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_stages'},async()=>{const{data}=await SB.from('pt_stages').select('*').order('sort_order',{ascending:true});if(data){DB.stages=data.map(r=>({id:r.id,name:r.name}));R();}})
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_settings'},async()=>{const{data}=await SB.from('pt_settings').select('*').eq('key','ddOptions').single();if(data&&data.value){DB.dd=data.value;R();}})
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_pending_signups'},async()=>{const{data}=await SB.from('pt_pending_signups').select('*');if(data){DB.pendingSignups=data;R();}})
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_audit_log'},async()=>{const{data}=await SB.from('pt_audit_log').select('*').order('created_at',{ascending:false}).limit(200);if(data){DB.auditLog=data.map(r=>({ts:new Date(r.created_at).toLocaleString('en-IN'),user:r.user_name,role:r.user_role,action:r.action,record:r.record_name,field:r.field_name,oldv:r.old_value||'',newv:r.new_value||''}));R();}})
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_stage_data'},async()=>{const{data}=await SB.from('pt_stage_data').select('*');if(data){DB.stageData=data.map(mapStageData);R();}})
    .subscribe();
}

  else{const pd=DB.pendingSignups.find(x=>x.email===e);pd?sal('Account pending admin approval.','ai',5000):sal('Invalid email or password','ae');}

  if(!n||!e||!p)return sal('Required fields missing','ae');

  if(DB.users.find(u=>u.email===e)||DB.pendingSignups.find(x=>x.email===e))return sal('Email already registered','ae');
  const{error}=await SB.from('pt_pending_signups').insert([{id:uid(),name:n,email:e,password:p,note:nt,requested_at:today()}]);
  if(error)return sal('Error: '+error.message,'ae');

}
async function rs1(){
  const e=(document.getElementById('re')?.value||'').trim();
  if(!e)return sal('Enter email','ae');
  if(!DB.users.find(u=>u.email===e))return sal('No account found with that email','ae');
  REMAIL=e;
  const tok=Math.floor(100000+Math.random()*900000).toString();
  const expiry=new Date(Date.now()+15*60*1000).toISOString();
  DB._rtok=tok;
  await SB.from('pt_settings').upsert([{key:'reset_'+e,value:{token:tok,expiry,used:false}}]);
  RS=2;AL=null;R();
}
async function rs2(){
  const entered=(document.getElementById('rt')?.value||'').trim();
  const{data}=await SB.from('pt_settings').select('*').eq('key','reset_'+REMAIL).single();
  if(!data?.value)return sal('No reset request found. Please start over.','ae');
  if(data.value.used)return sal('This code has already been used. Please request a new one.','ae');
  if(new Date(data.value.expiry)<new Date())return sal('Code expired (15 min limit). Please start over.','ae');
  if(data.value.token!==entered)return sal('Invalid code — please check and try again','ae');
  RS=3;AL=null;R();
}
async function rs3(){
  const np=document.getElementById('rnp')?.value||'',cp=document.getElementById('rcp')?.value||'';
  if(np.length<8)return sal('Min 8 chars','ae');
  if(np!==cp)return sal('Passwords do not match','ae');
  await SB.from('pt_users').update({password:np}).eq('email',REMAIL);
  // Mark token as used
  const{data}=await SB.from('pt_settings').select('*').eq('key','reset_'+REMAIL).single();
  if(data)await SB.from('pt_settings').update({value:{...data.value,used:true}}).eq('key','reset_'+REMAIL);
  ATAB='login';RS=1;REMAIL='';delete DB._rtok;
  sal('Password reset successfully! Sign in with your new password.','as',4000);
}

function filtAccs(){

function buildStageActionItems(stageData){
  const items=stageData?.actionItems||[{text:'',permanent:true}];
  const canAdd=items.length<5;
  let html='<div id="ai-container">';
  items.forEach((item,idx)=>{
    const isFirst=idx===0;
    html+=`<div class="ai-row" id="ai-row-${idx}" style="display:flex;align-items:center;gap:6px;margin-bottom:7px">
      <span style="font-size:10px;font-weight:700;color:var(--muted);min-width:16px">${idx+1}.</span>
      <input type="text" id="ai-text-${idx}" value="${(item.text||'').replace(/"/g,'&quot;')}"
             placeholder="${isFirst?'Action item 1 (always visible — optional to fill)':'Action item '+(idx+1)+'…'}"
             style="flex:1;background:#fff">
      ${!isFirst?`<button type="button" class="abtn-sm btn-red" onclick="removeAI(${idx})" style="padding:2px 8px;font-size:10px;flex-shrink:0">✕</button>`:''}
    </div>`;
  });
  html+='</div>';
  if(canAdd)html+=`<button type="button" class="abtn-sm btn-ghost" onclick="addAI()" style="margin-top:5px;font-size:11px;padding:4px 10px">+ Add Action Item (${items.length}/5)</button>`;
  else html+=`<div style="font-size:10px;color:var(--muted);margin-top:4px">Maximum 5 action items reached</div>`;
  return html;
}
function addAI(){
  const c=document.getElementById('ai-container');
  if(!c)return;
  const rows=c.querySelectorAll('.ai-row');
  if(rows.length>=5)return;
  const idx=rows.length;
  const row=document.createElement('div');
  row.className='ai-row';row.id='ai-row-'+idx;
  row.style.cssText='display:flex;align-items:center;gap:6px;margin-bottom:7px';
  row.innerHTML=`<span style="font-size:10px;font-weight:700;color:var(--muted);min-width:16px">${idx+1}.</span><input type="text" id="ai-text-${idx}" placeholder="Action item ${idx+1}…" style="flex:1;background:#fff"><button type="button" class="abtn-sm btn-red" onclick="removeAI(${idx})" style="padding:2px 8px;font-size:10px;flex-shrink:0">✕</button>`;
  c.appendChild(row);
  // update add button
  const addBtn=c.nextElementSibling;
  if(addBtn){const total=c.querySelectorAll('.ai-row').length;addBtn.textContent=total>=5?'':'+ Add Action Item ('+total+'/5)';if(total>=5)addBtn.style.display='none';}
}
function removeAI(idx){
  const c=document.getElementById('ai-container');if(!c)return;
  const row=document.getElementById('ai-row-'+idx);
  if(row)row.remove();
  // Re-index
  const rows=c.querySelectorAll('.ai-row');
  rows.forEach((r,i)=>{
    r.id='ai-row-'+i;
    const lbl=r.querySelector('span');if(lbl)lbl.textContent=(i+1)+'.';
    const inp=r.querySelector('input');if(inp)inp.id='ai-text-'+i;
    const btn=r.querySelector('button');if(btn&&i>0)btn.setAttribute('onclick','removeAI('+i+')');
  });
  const addBtn=c.nextElementSibling;
  if(addBtn){const total=rows.length;addBtn.textContent='+ Add Action Item ('+total+'/5)';addBtn.style.display=total<5?'':'none';}
}
function collectAI(){
  const items=[];const c=document.getElementById('ai-container');if(!c)return items;
  c.querySelectorAll('input[type=text]').forEach((inp,i)=>items.push({text:inp.value.trim(),permanent:i===0}));
  return items;
}

function drawCH(){

  if(dc)charts.d=new Chart(dc,{type:'doughnut',data:{labels:['Red','Yellow','Green'],datasets:[{data:[all.filter(a=>a.overallStatus==='red').length,all.filter(a=>a.overallStatus==='yellow').length,all.filter(a=>a.overallStatus==='green').length],backgroundColor:['#e74c3c','#e6a817','#3aaa5e'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{display:false}}}});

  const byP=DB.users.filter(u=>u.role==='partner').map(p=>({name:getDisplayName(p.name),od:all.filter(a=>a.assignedPartnerId===p.id&&a.amOD>0).length})).filter(x=>x.od>0);
  if(bc&&byP.length)charts.b=new Chart(bc,{type:'bar',data:{labels:byP.map(d=>d.name),datasets:[{data:byP.map(d=>d.od),backgroundColor:'#e74c3c',borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}});
  const sbEl=document.getElementById('stageBar');
  if(sbEl){
    const chartAccs=isA()?all:all.filter(a=>a.assignedPartnerId===CU.id);
    const stageCounts=DB.stages.map(s=>({name:s.name,count:chartAccs.filter(a=>a.stageId===s.id).length})).filter(s=>s.count>0);
    charts.sb=new Chart(sbEl,{type:'bar',data:{labels:stageCounts.map(s=>s.name.length>14?s.name.slice(0,14)+'…':s.name),datasets:[{data:stageCounts.map(s=>s.count),backgroundColor:['#4a7ec7','#3a8fd6','#3aaa5e','#e6a817','#e74c3c','#9b59b6'],borderRadius:6,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1,font:{size:10}}},x:{ticks:{font:{size:9}}}}}});
  }
  const cdEl=document.getElementById('connectDonut');
  if(cdEl){
    const donutAccs=isA()?all:all.filter(a=>a.assignedPartnerId===CU.id);
    // Count accounts with stage data in each AM stage
    const stageCts=AM_STAGES.map(s=>DB.stageData.filter(sd=>donutAccs.find(a=>a.id===sd.accountId)&&sd.stage===s).length);
    const noStage=donutAccs.filter(a=>!DB.stageData.find(sd=>sd.accountId===a.id)).length;
    charts.cd=new Chart(cdEl,{type:'doughnut',data:{labels:[...AM_STAGES,'Not started'],datasets:[{data:[...stageCts,noStage],backgroundColor:['#4a7ec7','#3a8fd6','#e6a817','#f39c12','#3aaa5e','#27ae60','#dde3ec'],borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{legend:{display:false}}}});
  }
  const amEl=document.getElementById('amLeader');
  if(amEl){
    const pts=isA()?DB.users.filter(u=>u.role==='partner'):DB.users.filter(u=>u.id===CU.id);
    const amData=pts.map(p=>{
      const pa=all.filter(a=>a.assignedPartnerId===p.id);
      // Progress based on stage data presence (1 stage = 16%, all 6 = 100%)
      const stagesUpdated=pa.reduce((sum,a)=>{return sum+(DB.stageData.filter(sd=>sd.accountId===a.id).length);},0);
      const maxPossible=pa.length*AM_STAGES.length;
      const avg=maxPossible>0?Math.round((stagesUpdated/maxPossible)*100):0;
      return{name:getDisplayName(p.name),avg,total:pa.length};
    }).filter(d=>d.total>0);
    if(amData.length)charts.am=new Chart(amEl,{type:'bar',data:{labels:amData.map(d=>d.name),datasets:[{data:amData.map(d=>d.avg),backgroundColor:amData.map(d=>d.avg>=66?'#3aaa5e':d.avg>=33?'#4a7ec7':'#e6a817'),borderRadius:6,borderSkipped:false}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,max:100,ticks:{callback:v=>v+'%',font:{size:10}}},y:{ticks:{font:{size:10}}}}}});
  }
  // Pie chart in Analytics page
  const pieEl=document.getElementById('acresPieChart');
  if(pieEl)drawAcresPie(pieEl);
}

function drawAcresPie(el){
  if(charts.pie){try{charts.pie.destroy();}catch(e){}}
  const groups={};
  DB.accounts.forEach(a=>{
    const key=a.accountGroup||'Ungrouped';
    if(!groups[key])groups[key]={label:key,importance:a.accountImportance||'—',peak:0,ab:0,ff:0,count:0};
    groups[key].peak+=(a.estimatedPeakPotential||0);
    groups[key].ab+=(a.fy2627AB||0);
    groups[key].ff+=(a.fy2627FF||0);
    groups[key].count++;
    if(a.accountImportance)groups[key].importance=a.accountImportance;
  });
  const data=Object.values(groups).sort((x,y)=>y.peak-x.peak);
  if(!data.length||data.every(d=>d.peak===0)){
    el.parentElement.innerHTML='<div style="text-align:center;padding:32px;color:var(--muted);font-size:12px">No Estimated Peak Potential data found.<br>Please populate this field in Account Records to see the chart.</div>';
    return;
  }
  const COLORS=['#4a7ec7','#3aaa5e','#e6a817','#e74c3c','#9b59b6','#1abc9c','#f39c12','#2980b9','#27ae60','#c0392b'];
  charts.pie=new Chart(el,{
    type:'pie',
    data:{labels:data.map(d=>d.label),datasets:[{data:data.map(d=>d.peak),backgroundColor:data.map((_,i)=>COLORS[i%COLORS.length]),borderWidth:2,borderColor:'#fff',hoverBorderWidth:3}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{position:'right',labels:{font:{size:11},boxWidth:12,padding:8}},
        tooltip:{callbacks:{label:ctx=>{const d=data[ctx.dataIndex];const tot=data.reduce((s,x)=>s+x.peak,0);const pct=tot>0?((d.peak/tot)*100).toFixed(1):'0';return d.label+': '+d.peak.toFixed(1)+' Acres ('+pct+'%)';}}}
      },
      onClick:(evt,els)=>{if(!els.length)return;showPieDetail(data[els[0].index],COLORS[els[0].index%COLORS.length]);}
    }
  });
}

function getRV(a){
  const am=a.am;
  const stageData=getSD(a.id);
  const latestSD=stageData.sort((x,y)=>new Date(y.updatedAt)-new Date(x.updatedAt))[0];
  const latestAI=latestSD?.actionItems?.filter(i=>i.text).map(i=>i.text).join(' | ')||'';
  return{
    companyName:a.companyName,accountGroup:a.accountGroup,focusArea:a.focusArea,
    programManager:a.programManager,companyType:a.companyType,accountPriority:a.accountPriority,
    opportunityCategory:a.opportunityCategory,crop:a.crop,stageName:gs(a.stageId).name,
    overallStatus:a.overallStatus,adminActionItem:a.adminActionItem||'',
    fy2627AB:a.fy2627AB||0,fy2627FF:a.fy2627FF||0,
    estimatedPeakPotential:a.estimatedPeakPotential||0,
    accountImportance:a.accountImportance||'',
    partnerName:gu(a.assignedPartnerId).name,
    connectStage:am?.connectStage||'',connectDateDM:am?.connectDateDM||'',
    nextConnectDateDM:am?.nextConnectDateDM||'',amOD:a.amOD||0,
    stagesUpdated:stageData.length,
    latestStage:latestSD?.stage||'',
    latestActionItem:latestAI,
  };
}

function getReportDateRange(){
  const from=document.getElementById('report-from-date')?.value||'';
  const to=document.getElementById('report-to-date')?.value||'';
  return{from,to};
}
function inDateRange(tsStr,from,to){
  if(!from&&!to)return true;
  try{
    const parts=tsStr.split(',')[0].trim().split('/');
    if(parts.length!==3)return true;
    const d=new Date(parts[2]+'-'+parts[1].padStart(2,'0')+'-'+parts[0].padStart(2,'0'));
    const dStr=d.toISOString().split('T')[0];
    if(from&&dStr<from)return false;
    if(to&&dStr>to)return false;
    return true;
  }catch(e){return true;}
}

async function buildBrandedWorkbook(title,columnHeaders,dataRows,colWidths,sheetName){
  const wb=new ExcelJS.Workbook();
  wb.creator='AgriTrack';wb.created=new Date();
  const ws=wb.addWorksheet(sheetName||'Report',{properties:{tabColor:{argb:'FF4A7EC7'}},views:[{state:'normal',zoomScale:100}]});
  ws.getRow(1).height=36;ws.getRow(2).height=18;ws.getRow(3).height=18;ws.getRow(4).height=6;
  const totalCols=Math.max(columnHeaders.length,8);
  const lastColLetter=String.fromCharCode(65+Math.min(totalCols-1,25));

  /* ── Embed String Bio logo ── */
  try{
    var _lid=wb.addImage({base64:LOGO_B64,extension:'jpeg'});
    ws.addImage(_lid,{tl:{col:0,row:0},ext:{width:200,height:54},editAs:'oneCell'});
  }catch(_e){console.warn('logo img:',_e);}

  ws.mergeCells('A1:'+lastColLetter+'1');
  const companyCell=ws.getCell('A1');
  companyCell.value='                                    String Bio Pvt Ltd — AgriTrack';
  companyCell.font={name:'Arial',bold:true,size:18,color:{argb:'FF4A7EC7'}};
  companyCell.alignment={horizontal:'center',vertical:'middle'};
  ws.mergeCells('A2:'+lastColLetter+'2');
  const subCell=ws.getCell('A2');
  subCell.value=title;
  subCell.font={name:'Arial',bold:true,size:12,color:{argb:'FF2D3748'}};
  subCell.alignment={horizontal:'center',vertical:'middle'};
  ws.mergeCells('A3:'+lastColLetter+'3');
  const metaCell=ws.getCell('A3');
  metaCell.value='Downloaded by: '+CU.name+' ('+displayRole(CU.role)+')  |  Date: '+new Date().toLocaleString('en-IN')+'  |  Records: '+dataRows.length;
  metaCell.font={name:'Arial',size:10,color:{argb:'FF7A8499'}};
  metaCell.alignment={horizontal:'center',vertical:'middle'};
  ws.getRow(4).height=6;
  const hdrRow=ws.getRow(5);
  columnHeaders.forEach((h,idx)=>{
    const cell=hdrRow.getCell(idx+1);
    cell.value=h;
    cell.font={name:'Arial',bold:true,size:11,color:{argb:'FFFFFFFF'}};
    cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF4A7EC7'}};
    cell.alignment={horizontal:'center',vertical:'middle',wrapText:true};
    cell.border={top:{style:'thin',color:{argb:'FF2D3748'}},bottom:{style:'thin',color:{argb:'FF2D3748'}},left:{style:'thin',color:{argb:'FF2D3748'}},right:{style:'thin',color:{argb:'FF2D3748'}}};
  });
  hdrRow.height=28;
  dataRows.forEach((row,idx)=>{
    const r=6+idx;
    const bgColor=idx%2===0?'FFF4F6FB':'FFFFFFFF';
    row.forEach((val,colIdx)=>{
      const cell=ws.getRow(r).getCell(colIdx+1);
      cell.value=val;
      cell.font={name:'Arial',size:10,color:{argb:'FF2D3748'}};
      cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:bgColor}};
      cell.alignment={vertical:'middle',wrapText:true};
      cell.border={top:{style:'thin',color:{argb:'FFDDE3EC'}},bottom:{style:'thin',color:{argb:'FFDDE3EC'}},left:{style:'thin',color:{argb:'FFDDE3EC'}},right:{style:'thin',color:{argb:'FFDDE3EC'}}};
    });
  });
  (colWidths||columnHeaders.map(()=>18)).forEach((w,idx)=>{ws.getColumn(idx+1).width=w;});
  return wb;
}
async function downloadWorkbook(wb,filename){
  const buf=await wb.xlsx.writeBuffer();
  const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  saveAs(blob,filename);
}

async function dlAccountsXLSX(){
  try{
    const dr=getReportDateRange();
    const sel=COLS.filter(c=>RPTP[c.k]);
    if(!sel.length)return sal('Please select at least one column','ae');
    let allAccs=enAccs();
    if(dr.from||dr.to){allAccs=allAccs.filter(a=>{const d=a.createdAt||a.updatedAt;if(dr.from&&d<dr.from)return false;if(dr.to&&d>dr.to)return false;return true;});}
    const colHdrs=sel.map(c=>c.l);
    const rows=allAccs.map(a=>{const v=getRV(a);return sel.map(c=>v[c.k]??'');});
    const widths=sel.map(c=>c.k.includes('Action')||c.k==='remarks'?28:18);
    const wb=await buildBrandedWorkbook('Accounts Report',colHdrs,rows,widths,'Accounts Report');
    await downloadWorkbook(wb,'StringBio_AgriTrack_Accounts_'+today()+'.xlsx');
    sal('Accounts report downloaded!','as');
  }catch(e){console.error(e);sal('Download failed: '+e.message,'ae');}
}

async function saveMyStageData(accountId){
  const stage=document.getElementById('sel-am-stage')?.value;
  if(!stage)return sal('Please select a stage','ae');
  const cd=document.getElementById('f-am-connect-date')?.value||null;
  const ncd=document.getElementById('f-am-next-date')?.value||null;
  if(cd&&ncd&&ncd<cd)return sal('Warning: Next Connect Date is before Connect Date','ae');
  const items=collectAI();
  const row={account_id:accountId,stage,connect_date:cd||null,next_connect_date:ncd||null,action_items:items,updated_at:new Date().toISOString()};
  const{error}=await SB.from('pt_stage_data').upsert([row],{onConflict:'account_id,stage'});
  if(error)return sal('Error: '+error.message,'ae');
  const{data:fresh}=await SB.from('pt_stage_data').select('*').eq('account_id',accountId);
  if(fresh){DB.stageData=DB.stageData.filter(s=>s.accountId!==accountId).concat(fresh.map(mapStageData));}
  const acc=DB.accounts.find(a=>a.id===accountId);
  await sbLog('Updated stage data',acc?.companyName||accountId,'stage','',stage,{accountId});
  sal('Stage data saved!','as');
}

async function saveAdminStageData(accountId){
  const stageEl=document.getElementById('sel-admin-stage');
  const stage=stageEl?.value;
  if(!stage)return sal('Please select a stage','ae');
  const cd=document.getElementById('fa-acd')?.value||null;
  const ncd=document.getElementById('fa-ncd')?.value||null;
  const items=collectAI();
  const row={account_id:accountId,stage,connect_date:cd||null,next_connect_date:ncd||null,action_items:items,updated_at:new Date().toISOString()};
  const{error}=await SB.from('pt_stage_data').upsert([row],{onConflict:'account_id,stage'});
  if(error)return sal('Error: '+error.message,'ae');
  const{data:fresh}=await SB.from('pt_stage_data').select('*').eq('account_id',accountId);
  if(fresh){DB.stageData=DB.stageData.filter(s=>s.accountId!==accountId).concat(fresh.map(mapStageData));}
  const acc=DB.accounts.find(a=>a.id===accountId);
  await sbLog('Admin updated stage data',acc?.companyName||accountId,'stage','',stage,{accountId});
  sal('Stage data saved!','as');
}

function onAdminStageSelect(accountId){
  const stage=document.getElementById('sel-admin-stage')?.value;
  if(!stage)return;
  const ex=getSDStage(accountId,stage);
  const cdEl=document.getElementById('fa-acd');
  const ncdEl=document.getElementById('fa-ncd');
  if(cdEl)cdEl.value=ex?.connectDate||'';
  if(ncdEl)ncdEl.value=ex?.nextConnectDate||'';
  const wrapper=document.getElementById('admin-ai-wrapper');
  if(wrapper)wrapper.innerHTML=buildStageActionItems(ex);
}

async function saveAcc(id){
  const cn=(document.getElementById('fa-cn')?.value||'').trim();
  if(!cn)return sal('Company name is required','ae');
  const existingAcc=id?DB.accounts.find(a=>a.id===id):null;
  const partnerId=existingAcc?existingAcc.assignedPartnerId:(document.getElementById('fa-p')?.value||'');
  const row={
    id:id||uid(),company_name:cn,company_email:document.getElementById('fa-ce')?.value||'',
    focus_area:document.getElementById('fa-fa')?.value||'',account_group:document.getElementById('fa-ag')?.value||'',
    program_manager:document.getElementById('fa-pm')?.value||'',company_type:document.getElementById('fa-ct')?.value||'',
    account_priority:document.getElementById('fa-ap')?.value||'',opportunity_category:document.getElementById('fa-oc')?.value||'',
    crop:document.getElementById('fa-cr')?.value||'',stage_id:document.getElementById('fa-st')?.value||'',
    overall_status:document.getElementById('fa-os')?.value||'yellow',
    assigned_partner_id:partnerId,
    admin_action_item:document.getElementById('fa-aai')?.value||'',
    fy_26_27_ab_acres:parseFloat(document.getElementById('fa-ab')?.value)||null,
    fy_26_27_ff_acres:parseFloat(document.getElementById('fa-ff')?.value)||null,
    estimated_peak_potential:parseFloat(document.getElementById('fa-ep')?.value)||null,
    account_importance:document.getElementById('fa-ai')?.value||null,
    updated_at:new Date().toISOString()
  };
  if(!id)row.created_at=new Date().toISOString();
  const{error}=await SB.from('pt_accounts').upsert([row]);
  if(error)return sal('Error: '+error.message,'ae');
  await sbLog(id?'Updated account record':'Created account record',cn,'overview','',id?'updated':'created',{accountId:row.id});
  const{data:fresh}=await SB.from('pt_accounts').select('*').order('created_at',{ascending:true});
  if(fresh)DB.accounts=fresh.map(mapAcc);
  window._aSel=row.id;
  sal(id?'Account updated!':'Account created!','as');
}

async function delAcc(id){const a=DB.accounts.find(x=>x.id===id);await SB.from('pt_stage_data').delete().eq('account_id',id);await SB.from('pt_am_updates').delete().eq('account_id',id);await SB.from('pt_accounts').delete().eq('id',id);await sbLog('Deleted account',a?.companyName||id,'','','deleted');window._aSel=null;sal('Account deleted','as');}
async function approveP(id){const p=DB.pendingSignups.find(x=>x.id===id);if(!p)return;await SB.from('pt_users').insert([{id:uid(),name:p.name,email:p.email,password:p.password,role:'partner',status:'active'}]);await SB.from('pt_pending_signups').delete().eq('id',id);await sbLog('Approved partner',p.name,'status','pending','active');sal(`${p.name} approved!`,'as');}
async function rejectP(id){const p=DB.pendingSignups.find(x=>x.id===id);await SB.from('pt_pending_signups').delete().eq('id',id);sal(`${p?.name||'Request'} rejected`,'as');}
async function adminRP(id){const np=document.getElementById('mnp')?.value||'',cp=document.getElementById('mcp')?.value||'';if(np.length<8)return sal('Min 8 chars','ae');if(np!==cp)return sal('Passwords do not match','ae');await SB.from('pt_users').update({password:np}).eq('id',id);closeM();sal('Password reset!','as');}
async function saveProf(){const n=(document.getElementById('men')?.value||'').trim(),e=(document.getElementById('mee')?.value||'').trim();if(!n||!e)return sal('Fields required','ae');if(DB.users.find(u=>u.email===e&&u.id!==CU.id))return sal('Email in use','ae');await SB.from('pt_users').update({name:n,email:e}).eq('id',CU.id);CU.name=n;CU.email=e;sal('Profile updated!','as');}
async function changePw(){const cur=document.getElementById('mec')?.value||'',np=document.getElementById('men2')?.value||'',cp=document.getElementById('mecf')?.value||'';if(cur!==CU.password)return sal('Current password incorrect','ae');if(np.length<8)return sal('Min 8 chars','ae');if(np!==cp)return sal('Passwords do not match','ae');await SB.from('pt_users').update({password:np}).eq('id',CU.id);CU.password=np;sal('Password updated!','as');}
async function savePart(id){const n=(document.getElementById('mn')?.value||'').trim(),e=(document.getElementById('me')?.value||'').trim(),p=id?null:document.getElementById('mp')?.value||'';if(!n||!e||(!id&&!p))return sal('Fields required','ae');if(!id&&p.length<8)return sal('Min 8 chars','ae');if(id){await SB.from('pt_users').update({name:n,email:e}).eq('id',id);}else{if(DB.users.find(u=>u.email===e))return sal('Email in use','ae');await SB.from('pt_users').insert([{id:uid(),name:n,email:e,password:p,role:'partner',status:'active',partner_permissions:{...DEFAULT_PARTNER_PERMS}}]);}closeM();sal('Partner saved!','as');}
async function delPart(id){if(id===CU.id)return sal("Can't remove yourself",'ae');await SB.from('pt_users').delete().eq('id',id);sal('Partner removed','as');}
async function savePartnerPerms(id){const pperms={};Object.keys(PARTNER_PERM_LABELS).forEach(key=>{const el=document.getElementById('pperm-'+key);pperms[key]=el?el.checked:true;});const{error}=await SB.from('pt_users').update({partner_permissions:pperms}).eq('id',id);if(error)return sal('Error: '+error.message,'ae');const u=DB.users.find(x=>x.id===id);if(u)u.partner_permissions=pperms;if(CU.id===id)CU.partner_permissions=pperms;const{data}=await SB.from('pt_users').select('*');if(data)DB.users=data;closeM();sal('Partner access updated!','as',5000);}
async function savePerms(id){const perms={};Object.keys(PERM_LABELS).forEach(key=>{const el=document.getElementById('perm-'+key);perms[key]=el?el.checked:false;});const{error}=await SB.from('pt_users').update({permissions:perms}).eq('id',id);if(error)return sal('Error: '+error.message,'ae');const u=DB.users.find(x=>x.id===id);if(u)u.permissions=perms;if(CU.id===id)CU.permissions=perms;closeM();sal('Permissions updated!','as');}
async function saveAdm(id){const n=(document.getElementById('mn')?.value||'').trim(),e=(document.getElementById('me')?.value||'').trim(),p=id?null:document.getElementById('mp')?.value||'';if(!n||!e||(!id&&!p))return sal('Fields required','ae');if(!id&&p.length<8)return sal('Min 8 chars','ae');if(id){await SB.from('pt_users').update({name:n,email:e}).eq('id',id);}else{if(DB.users.find(u=>u.email===e))return sal('Email in use','ae');await SB.from('pt_users').insert([{id:uid(),name:n,email:e,password:p,role:'admin',status:'active',permissions:{...DEFAULT_PERMS}}]);}closeM();sal('Admin saved!','as');}
async function delAdm(id){if(id===CU.id)return sal("Can't remove yourself",'ae');await SB.from('pt_users').delete().eq('id',id);sal('Admin removed','as');}
async function saveStg(id){const n=(document.getElementById('mn')?.value||'').trim();if(!n)return sal('Stage name required','ae');if(id){await SB.from('pt_stages').update({name:n}).eq('id',id);}else{await SB.from('pt_stages').insert([{id:uid(),name:n,sort_order:DB.stages.length+1}]);}closeM();sal('Stage saved!','as');}
async function delStg(id){await SB.from('pt_stages').delete().eq('id',id);sal('Stage deleted','as');}
async function addDD(key){const inp=document.getElementById('dd-'+key);if(!inp?.value.trim())return;if(!DB.dd[key])DB.dd[key]=[];if(!DB.dd[key].includes(inp.value.trim()))DB.dd[key].push(inp.value.trim());await SB.from('pt_settings').upsert([{key:'ddOptions',value:DB.dd}]);inp.value='';sal('Option added!','as');}
async function rmDD(key,i){DB.dd[key].splice(i,1);await SB.from('pt_settings').upsert([{key:'ddOptions',value:DB.dd}]);sal('Option removed','as');}

});
