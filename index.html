    SB.from('pt_users').select('*'),
    SB.from('pt_accounts').select('*').order('created_at',{ascending:true}),
    SB.from('pt_am_updates').select('*').order('updated_at',{ascending:false}),
    SB.from('pt_stages').select('*').order('sort_order',{ascending:true}),
    SB.from('pt_settings').select('*').eq('key','ddOptions').single(),
    SB.from('pt_pending_signups').select('*'),
    SB.from('pt_audit_log').select('*').order('created_at',{ascending:false}).limit(200),
  ]);
  if(usersR.data)DB.users=usersR.data;
  if(accountsR.data)DB.accounts=accountsR.data.map(mapAccount);
  if(amR.data)DB.amUpdates=amR.data.map(mapAMUpdate);
  if(stagesR.data)DB.stages=stagesR.data.map(r=>({id:r.id,name:r.name}));
  if(ddR.data)DB.ddOptions=ddR.data.value;
  if(pendingR.data)DB.pendingSignups=pendingR.data;
  if(auditR.data)DB.auditLog=auditR.data.map(r=>({ts:new Date(r.created_at).toLocaleString('en-IN'),user:r.user_name,role:r.user_role,action:r.action,record:r.record_name,field:r.field_name,oldv:r.old_value||'',newv:r.new_value||''}));
}

async function sbSeed(){
  /* Only runs on first boot when tables are empty */
  await SB.from('pt_users').upsert(SEED_USERS.map(u=>({id:u.id,name:u.name,email:u.email,password:u.password,role:u.role,status:u.status})));
  await SB.from('pt_stages').upsert(SEED_STAGES.map((s,i)=>({id:s.id,name:s.name,sort_order:i+1})));
  await SB.from('pt_settings').upsert([{key:'ddOptions',value:SEED_DDOPTIONS}]);
  await SB.from('pt_accounts').upsert(SEED_ACCOUNTS.map(a=>({...a})));
  await SB.from('pt_am_updates').upsert(SEED_AM_UPDATES.map(a=>({...a})));
}

async function bootDB(){
  /* Check if already seeded */
  const{data:existing}=await SB.from('pt_users').select('id').limit(1);
  if(!existing||existing.length===0)await sbSeed();
  await sbLoad();
  /* Restore session from localStorage */
  const savedId=localStorage.getItem('pt_session');
  if(savedId){const u=DB.users.find(x=>x.id===savedId&&x.status==='active');if(u)CU=u;}
  BOOT=false;R();
  document.getElementById('sync-badge').style.display='block';
  startRealtime();
}

/* Real-time subscriptions — changes from ANY user arrive instantly */
function startRealtime(){
  /* Subscribe to all table changes */
  SB.channel('pt-realtime')
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_accounts'},()=>refreshAccounts())
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_am_updates'},()=>refreshAM())
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_users'},()=>refreshUsers())
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_stages'},()=>refreshStages())
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_settings'},()=>refreshDD())
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_pending_signups'},()=>refreshPending())
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_audit_log'},()=>refreshAudit())
    .subscribe();
}

async function refreshAccounts(){const{data}=await SB.from('pt_accounts').select('*').order('created_at',{ascending:true});if(data){DB.accounts=data.map(mapAccount);R();}}

async function refreshStages(){const{data}=await SB.from('pt_stages').select('*').order('sort_order',{ascending:true});if(data){DB.stages=data.map(r=>({id:r.id,name:r.name}));R();}}
async function refreshDD(){const{data}=await SB.from('pt_settings').select('*').eq('key','ddOptions').single();if(data)DB.ddOptions=data.value;R();}
async function refreshPending(){const{data}=await SB.from('pt_pending_signups').select('*');if(data){DB.pendingSignups=data;R();}}

async function doLogin(){
  const e=(document.getElementById('le')?.value||'').trim(),p=document.getElementById('lp')?.value||'';
  const u=DB.users.find(x=>x.email===e&&x.password===p&&x.status==='active');
  if(u){CU=u;AL=null;PAGE='dashboard';localStorage.setItem('pt_session',u.id);R();}
  else{const pd=DB.pendingSignups.find(x=>x.email===e);pd?sal('Account pending admin approval.','ai',5000):sal('Invalid email or password','ae');}
}
async function doSignup(){
  const n=(document.getElementById('sn')?.value||'').trim(),e=(document.getElementById('se')?.value||'').trim(),p=document.getElementById('sp')?.value||'',nt=(document.getElementById('snt')?.value||'').trim();
  if(!n||!e||!p)return sal('Required fields missing','ae');
  if(p.length<8)return sal('Password must be at least 8 characters','ae');
  if(DB.users.find(u=>u.email===e)||DB.pendingSignups.find(x=>x.email===e))return sal('Email already registered','ae');
  const{error}=await SB.from('pt_pending_signups').insert([{id:uid(),name:n,email:e,password:p,note:nt,requested_at:today()}]);
  if(error)return sal('Error submitting request','ae');
  ATAB='login';sal('Request submitted! Admin will review shortly.','as',5000);
}
async function rs1(){
  const e=(document.getElementById('re')?.value||'').trim();
  if(!e)return sal('Enter email','ae');if(!DB.users.find(u=>u.email===e))return sal('No account found','ae');
  REMAIL=e;
  const tok=Math.floor(100000+Math.random()*900000).toString();
  await SB.from('pt_settings').upsert([{key:'reset_'+e,value:{token:tok,used:false,email:e}}]);
  RS=2;AL=null;
  /* Show token on screen (simulating email) */
  DB._resetToken=tok;R();
}
async function rs2(){
  const entered=(document.getElementById('rt')?.value||'').trim();
  if(!DB._resetToken||DB._resetToken!==entered)return sal('Invalid code','ae');
  RS=3;AL=null;R();
}
async function rs3(){
  const np=document.getElementById('rnp')?.value||'',cp=document.getElementById('rcp')?.value||'';
  if(np.length<8)return sal('Min 8 chars','ae');if(np!==cp)return sal('Passwords do not match','ae');
  const{error}=await SB.from('pt_users').update({password:np}).eq('email',REMAIL);
  if(error)return sal('Error resetting password','ae');
  await SB.from('pt_settings').delete().eq('key','reset_'+REMAIL);
  ATAB='login';RS=1;REMAIL='';delete DB._resetToken;
  sal('Password reset! Sign in.','as',4000);
}
async function doLogout(){CU=null;AL=null;ATAB='login';localStorage.removeItem('pt_session');R();}

    return html.replace('------',DB._resetToken);

  return html;
}

    <div style="font-size:18px;font-weight:700;color:#e74c3c">Connection Failed</div>
    <div style="font-size:14px;color:#7a8499;text-align:center;max-width:400px">Could not connect to Supabase. Please check that your SUPABASE_URL and SUPABASE_ANON_KEY are set correctly at the top of this file.</div>
    <div style="background:#1a1a2e;color:#3aaa5e;font-family:monospace;padding:12px 20px;border-radius:8px;font-size:12px">${err.message||'Check browser console for details'}</div>
  </div>`;
});
</script>
</body>
</html>
