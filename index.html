/* Check partner permission */
function canPartner(perm){
  if(!CU)return false;
  if(CU.role==='superadmin'||CU.role==='admin')return true;
  const perms=CU.partner_permissions||{...DEFAULT_PARTNER_PERMS};
  return perms[perm]!==false;
}

function mapAcc(r){return{id:r.id,companyName:r.company_name,companyEmail:r.company_email||'',focusArea:r.focus_area||'',accountGroup:r.account_group||'',programManager:r.program_manager||'',companyType:r.company_type||'',accountPriority:r.account_priority||'',opportunityCategory:r.opportunity_category||'',crop:r.crop||'',stageId:r.stage_id||'',overallStatus:r.overall_status||'yellow',assignedPartnerId:r.assigned_partner_id||'',trials:{stage:r.trial_stage||'',status:r.trial_status||'yellow',connectDate:r.trial_connect_date||'',agriManager:r.agri_manager||'',remarks:r.remarks||''},createdAt:r.created_at?r.created_at.split('T')[0]:today(),updatedAt:r.updated_at?r.updated_at.split('T')[0]:today()};}
function mapAM(r){return{id:r.id,account_id:r.account_id,partnerId:r.partner_id,connectStage:r.connect_stage||'',actionItem:r.action_item||'',connectDateDM:r.connect_date_dm||'',nextConnectDateDM:r.next_connect_date_dm||'',updatedAt:r.updated_at?r.updated_at.split('T')[0]:today()};}

async function sbLoad(){
  const[uR,aR,amR,stR,ddR,pR,auR]=await Promise.all([
    SB.from('pt_users').select('*'),
    SB.from('pt_accounts').select('*').order('created_at',{ascending:true}),
    SB.from('pt_am_updates').select('*'),
    SB.from('pt_stages').select('*').order('sort_order',{ascending:true}),
    SB.from('pt_settings').select('*').eq('key','ddOptions').single(),
    SB.from('pt_pending_signups').select('*'),
    SB.from('pt_audit_log').select('*').order('created_at',{ascending:false}).limit(200),
  ]);
  if(uR.data)DB.users=uR.data;
  if(aR.data)DB.accounts=aR.data.map(mapAcc);
  if(amR.data)DB.amUpdates=amR.data.map(mapAM);
  if(stR.data)DB.stages=stR.data.map(r=>({id:r.id,name:r.name}));
  if(ddR.data&&ddR.data.value)DB.dd=ddR.data.value;
  if(pR.data)DB.pendingSignups=pR.data;
  if(auR.data)DB.auditLog=auR.data.map(r=>({ts:new Date(r.created_at).toLocaleString('en-IN'),user:r.user_name,role:r.user_role,action:r.action,record:r.record_name,field:r.field_name,oldv:r.old_value||'',newv:r.new_value||''}));
}

async function sbSeed(){
  await SB.from('pt_users').upsert(SEED_USERS);
  await SB.from('pt_stages').upsert(SEED_STAGES);
  await SB.from('pt_settings').upsert([{key:'ddOptions',value:SEED_DD}]);
  await SB.from('pt_accounts').upsert(SEED_ACCOUNTS);
  await SB.from('pt_am_updates').upsert(SEED_AM);
}

async function bootDB(){
  const{data:ex}=await SB.from('pt_users').select('id').limit(1);
  if(!ex||ex.length===0)await sbSeed();
  await sbLoad();
  const sid=localStorage.getItem('pt_session');
  if(sid){const u=DB.users.find(x=>x.id===sid&&x.status==='active');if(u){CU={...u};}}
  BOOT=false;R();
  document.getElementById('sync-badge').style.display='block';
  SB.channel('pt-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_accounts'},async()=>{const{data}=await SB.from('pt_accounts').select('*').order('created_at',{ascending:true});if(data){DB.accounts=data.map(mapAcc);R();}})
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_am_updates'},async()=>{const{data}=await SB.from('pt_am_updates').select('*');if(data){DB.amUpdates=data.map(mapAM);R();}})
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_users'},async()=>{const{data}=await SB.from('pt_users').select('*');if(data){DB.users=data;if(CU){const s=DB.users.find(u=>u.id===CU.id&&u.status==='active');if(!s){CU=null;localStorage.removeItem('pt_session');}else CU={...s};}R();}})
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_stages'},async()=>{const{data}=await SB.from('pt_stages').select('*').order('sort_order',{ascending:true});if(data){DB.stages=data.map(r=>({id:r.id,name:r.name}));R();}})
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_settings'},async()=>{const{data}=await SB.from('pt_settings').select('*').eq('key','ddOptions').single();if(data&&data.value){DB.dd=data.value;R();}})
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_pending_signups'},async()=>{const{data}=await SB.from('pt_pending_signups').select('*');if(data){DB.pendingSignups=data;R();}})
    .on('postgres_changes',{event:'*',schema:'public',table:'pt_audit_log'},async()=>{const{data}=await SB.from('pt_audit_log').select('*').order('created_at',{ascending:false}).limit(200);if(data){DB.auditLog=data.map(r=>({ts:new Date(r.created_at).toLocaleString('en-IN'),user:r.user_name,role:r.user_role,action:r.action,record:r.record_name,field:r.field_name,oldv:r.old_value||'',newv:r.new_value||''}));R();}})
    .subscribe();
}

async function sbLog(action,record,field,oldv,newv,extra={}){
  try{
    await SB.from('pt_audit_log').insert([{
      user_name:CU.name,
      user_role:CU.role,
      action,
      record_name:record,
      field_name:field,
      old_value:oldv||'',
      new_value:newv||'',
      user_id:CU.id,
      account_id:extra.accountId||null,
      extra_data:Object.keys(extra).length?JSON.stringify(extra):null,
    }]);
  }catch(e){console.warn('audit log failed:',e);}
}

async function doLogin(){
  const e=(document.getElementById('le')?.value||'').trim(),p=document.getElementById('lp')?.value||'';
  const u=DB.users.find(x=>x.email===e&&x.password===p&&x.status==='active');
  if(u){CU=u;AL=null;PAGE='dashboard';localStorage.setItem('pt_session',u.id);R();}
  else{const pd=DB.pendingSignups.find(x=>x.email===e);pd?sal('Account pending admin approval.','ai',5000):sal('Invalid email or password','ae');}
}
async function doSignup(){
  const n=(document.getElementById('sn')?.value||'').trim(),e=(document.getElementById('se')?.value||'').trim(),p=document.getElementById('sp')?.value||'',nt=(document.getElementById('snt')?.value||'').trim();
  if(!n||!e||!p)return sal('Required fields missing','ae');
  if(p.length<8)return sal('Password must be at least 8 characters','ae');
  if(DB.users.find(u=>u.email===e)||DB.pendingSignups.find(x=>x.email===e))return sal('Email already registered','ae');
  const{error}=await SB.from('pt_pending_signups').insert([{id:uid(),name:n,email:e,password:p,note:nt,requested_at:today()}]);
  if(error)return sal('Error: '+error.message,'ae');
  ATAB='login';sal('Request submitted! Admin will review shortly.','as',5000);
}
async function rs1(){
  const e=(document.getElementById('re')?.value||'').trim();
  if(!e)return sal('Enter email','ae');
  if(!DB.users.find(u=>u.email===e))return sal('No account found','ae');
  REMAIL=e;const tok=Math.floor(100000+Math.random()*900000).toString();DB._rtok=tok;
  await SB.from('pt_settings').upsert([{key:'reset_'+e,value:{token:tok}}]);
  RS=2;AL=null;R();
}
async function rs2(){
  const entered=(document.getElementById('rt')?.value||'').trim();
  if(!DB._rtok||DB._rtok!==entered)return sal('Invalid code','ae');
  RS=3;AL=null;R();
}
async function rs3(){
  const np=document.getElementById('rnp')?.value||'',cp=document.getElementById('rcp')?.value||'';
  if(np.length<8)return sal('Min 8 chars','ae');
  if(np!==cp)return sal('Passwords do not match','ae');
  await SB.from('pt_users').update({password:np}).eq('email',REMAIL);
  await SB.from('pt_settings').delete().eq('key','reset_'+REMAIL);
  ATAB='login';RS=1;REMAIL='';delete DB._rtok;sal('Password reset! Sign in.','as',4000);
}
async function doLogout(){CU=null;AL=null;ATAB='login';localStorage.removeItem('pt_session');R();}

function enAccs(){return DB.accounts.map(a=>{const am=getAM(a.id);return{...a,am,partnerName:gu(a.assignedPartnerId).name,stageName:gs(a.stageId).name,amOD:am?odD(am.nextConnectDateDM):0,trOD:odD(a.trials.connectDate)};});}
function filtAccs(){
  let r=isA()?enAccs():enAccs().filter(a=>a.assignedPartnerId===CU.id);
  if(FILTERS.status)r=r.filter(a=>a.overallStatus===FILTERS.status);
  if(FILTERS.partner)r=r.filter(a=>a.assignedPartnerId===FILTERS.partner);
  if(FILTERS.stage)r=r.filter(a=>a.stageId===FILTERS.stage);
  if(SEARCH)r=r.filter(a=>a.companyName.toLowerCase().includes(SEARCH.toLowerCase())||a.partnerName.toLowerCase().includes(SEARCH.toLowerCase()));
  if(Object.values(SF).some(Boolean))r=r.filter(a=>{const od=a.amOD>0;const ds=!od&&a.am?.nextConnectDateDM&&(new Date(a.am.nextConnectDateDM)-new Date(today()))/86400000<=3;return(SF.red&&od)||(SF.yellow&&ds)||(SF.green&&a.overallStatus==='green');});
  if(ASGN&&ASGN!=='all')r=r.filter(a=>a.assignedPartnerId===ASGN);
  return r;
}

function drawCH(){
  Object.values(charts).forEach(c=>{try{c.destroy();}catch(e){}});charts={};
  const all=enAccs();

  // Analytics page charts
  const dc=document.getElementById('donutC');
  if(dc)charts.d=new Chart(dc,{type:'doughnut',data:{labels:['Red','Yellow','Green'],datasets:[{data:[all.filter(a=>a.overallStatus==='red').length,all.filter(a=>a.overallStatus==='yellow').length,all.filter(a=>a.overallStatus==='green').length],backgroundColor:['#e74c3c','#e6a817','#3aaa5e'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{display:false}}}});
  const bc=document.getElementById('barC');
  const byP=DB.users.filter(u=>u.role==='partner').map(p=>({name:p.name.split(' ')[0],od:all.filter(a=>a.assignedPartnerId===p.id&&a.amOD>0).length})).filter(x=>x.od>0);
  if(bc&&byP.length)charts.b=new Chart(bc,{type:'bar',data:{labels:byP.map(d=>d.name),datasets:[{data:byP.map(d=>d.od),backgroundColor:'#e74c3c',borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}});

  // Dashboard charts
  const sbEl=document.getElementById('stageBar');
  if(sbEl){
    const stageMap={};
    DB.stages.forEach(s=>{stageMap[s.id]=s.name;});
    const stageCounts=DB.stages.map(s=>({name:s.name,count:all.filter(a=>a.stageId===s.id).length}));
    charts.sb=new Chart(sbEl,{type:'bar',data:{labels:stageCounts.map(s=>s.name.length>14?s.name.slice(0,14)+'…':s.name),datasets:[{data:stageCounts.map(s=>s.count),backgroundColor:['#4a7ec7','#3a8fd6','#3aaa5e','#e6a817','#e74c3c','#9b59b6'],borderRadius:6,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1,font:{size:10}}},x:{ticks:{font:{size:9}}}}}});
  }

  const cdEl=document.getElementById('connectDonut');
  if(cdEl){
    const cStages=['Initial connect','Trials connect','Business connect'];
    const cCounts=[all.filter(a=>a.am?.connectStage==='Initial connect').length,all.filter(a=>a.am?.connectStage==='Trials connect').length,all.filter(a=>a.am?.connectStage==='Business connect').length,all.filter(a=>!a.am?.connectStage).length];
    charts.cd=new Chart(cdEl,{type:'doughnut',data:{labels:['Initial connect','Trials connect','Business connect','Not started'],datasets:[{data:cCounts,backgroundColor:['#e6a817','#4a7ec7','#3aaa5e','#dde3ec'],borderWidth:2,borderColor:'#fff'}]},options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{legend:{display:false}}}});
  }

  const amEl=document.getElementById('amLeader');
  if(amEl){
    const stagePct={'Initial connect':33,'Trials connect':66,'Business connect':100};
    const pts=DB.users.filter(u=>u.role==='partner');
    const amData=pts.map(p=>{
      const pa=all.filter(a=>a.assignedPartnerId===p.id);
      const avg=pa.length?Math.round(pa.reduce((s,a)=>s+(stagePct[a.am?.connectStage]||0),0)/pa.length):0;
      return{name:p.name.split(' ')[0],avg};
    }).filter(d=>d.avg>0||all.filter(a=>a.assignedPartnerId===pts.find(p=>p.name.split(' ')[0]===d.name)?.id).length>0);
    if(amData.length){

async function saveAMUpdate(accId,exId){
  const cs=document.getElementById('f-cs')?.value||'',acd=document.getElementById('f-acd')?.value||'',ncd=document.getElementById('f-ncd')?.value||'',ai=document.getElementById('f-ai')?.value||'';
  const acc=DB.accounts.find(a=>a.id===accId);
  if(!acd&&!ncd)return sal('Please enter at least one date','ae');
  const row={id:exId||uid(),account_id:accId,partner_id:CU.id,connect_stage:cs,action_item:ai,connect_date_dm:acd||null,next_connect_date_dm:ncd||null,updated_at:new Date().toISOString()};
  const{error}=await SB.from('pt_am_updates').upsert([row]);
  if(error)return sal('Error: '+error.message,'ae');
  // Log detailed audit entries per field
  const prev=DB.amUpdates.find(x=>x.id===exId)||{};
  if(cs!==prev.connectStage)await sbLog('Updated Connect Stage',acc?.companyName||accId,'connectStage',prev.connectStage||'',cs,{accountId:accId,userId:CU.id});
  if(acd!==prev.connectDateDM)await sbLog('Updated Connect Date',acc?.companyName||accId,'connectDateDM',prev.connectDateDM||'',acd,{accountId:accId,userId:CU.id});
  if(ncd!==prev.nextConnectDateDM)await sbLog('Updated Next Connect Date',acc?.companyName||accId,'nextConnectDateDM',prev.nextConnectDateDM||'',ncd,{accountId:accId,userId:CU.id});
  if(ai!==prev.actionItem)await sbLog('Updated Action Item',acc?.companyName||accId,'actionItem',prev.actionItem||'',ai,{accountId:accId,userId:CU.id});
  sal('AM Connect saved — visible to all users!','as');
}

async function saveAcc(id){

  const row={id:id||uid(),company_name:cn,company_email:document.getElementById('fa-ce')?.value||'',focus_area:document.getElementById('fa-fa')?.value||'',account_group:document.getElementById('fa-ag')?.value||'',program_manager:document.getElementById('fa-pm')?.value||'',company_type:document.getElementById('fa-ct')?.value||'',account_priority:document.getElementById('fa-ap')?.value||'',opportunity_category:document.getElementById('fa-oc')?.value||'',crop:document.getElementById('fa-cr')?.value||'',stage_id:document.getElementById('fa-st')?.value||'',overall_status:document.getElementById('fa-os')?.value||'yellow',assigned_partner_id:document.getElementById('fa-p')?.value||'',trial_stage:document.getElementById('fa-ts')?.value||'',trial_status:document.getElementById('fa-tst')?.value||'yellow',trial_connect_date:document.getElementById('fa-tcd')?.value||null,agri_manager:document.getElementById('fa-am')?.value||'',remarks:document.getElementById('fa-rm')?.value||'',updated_at:new Date().toISOString()};
  if(!id)row.created_at=new Date().toISOString();

}

async function delStg(id){await SB.from('pt_stages').delete().eq('id',id);sal('Stage deleted','as');}
async function addDD(key){const inp=document.getElementById('dd-'+key);if(!inp?.value.trim())return;if(!DB.dd[key])DB.dd[key]=[];if(!DB.dd[key].includes(inp.value.trim()))DB.dd[key].push(inp.value.trim());await SB.from('pt_settings').upsert([{key:'ddOptions',value:DB.dd}]);inp.value='';sal('Option added!','as');}
async function rmDD(key,i){DB.dd[key].splice(i,1);await SB.from('pt_settings').upsert([{key:'ddOptions',value:DB.dd}]);sal('Option removed','as');}

bootDB().catch(err=>{
  document.getElementById('root').innerHTML=`<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:#eef2f7;padding:20px"><div style="font-size:18px;font-weight:700;color:#e74c3c">Connection Failed</div><div style="font-size:13px;color:#7a8499;text-align:center;max-width:400px">Could not connect to Supabase. Check your URL and anon key.</div><div style="background:#1a1a2e;color:#3aaa5e;font-family:monospace;padding:12px 20px;border-radius:8px;font-size:12px">${err.message||'See browser console'}</div></div>`;
});
